<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Doctor Portal · A P Medical Center</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111C2A;--bg2:#162030;--card:#1E2D40;--card2:#243447;
  --rail:#0F1825;
  --blue:#3D7EBF;--blue-s:rgba(61,126,191,.15);
  --amber:#D4922A;--amber-s:rgba(212,146,42,.15);
  --green:#6B9E6B;--green-s:rgba(107,158,107,.15);
  --rose:#B47A7A;--rose-s:rgba(180,122,122,.15);
  --lav:#9B8FCC;--lav-s:rgba(155,143,204,.15);
  --ink:#E8F0F7;--muted:rgba(232,240,247,.55);--faint:rgba(232,240,247,.25);
  --line:rgba(255,255,255,.08);--r:14px;
  --shadow:0 2px 8px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  /* light pane overrides */
  --LP-bg:#F0F4F8;--LP-card:#FFFFFF;--LP-card2:#F7FAFC;
  --LP-ink:#1A2B3C;--LP-muted:#6A849A;--LP-faint:#A8BDD0;
  --LP-line:#DCE8F0;--LP-navy:#1A3353;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Figtree',sans-serif;font-size:15px;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
svg{display:block;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
button{font-family:'Figtree';cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'Figtree';outline:none}

/* ── LOGIN ── */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#080E16 0%,#0F1825 50%,#162030 100%);padding:20px}
.lbox{background:#1E2D40;border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:44px 40px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.lmark{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#3D7EBF,#1A4A7A);display:grid;place-items:center;margin:0 auto 22px;font-family:'Instrument Serif',serif;font-size:22px;color:#fff}
.lbox h1{font-family:'Instrument Serif',serif;font-size:28px;color:#E8F0F7;text-align:center;margin-bottom:4px}
.lbox h1 em{font-style:italic;color:#3D7EBF}
.lsub{text-align:center;font-size:13px;color:rgba(232,240,247,.45);margin-bottom:28px}
.llbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(232,240,247,.45);margin-bottom:6px;margin-top:16px}
.lfi{width:100%;padding:12px 14px;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;font-size:14px;color:#E8F0F7;background:#243447;transition:border-color .18s}
.lfi:focus{border-color:#3D7EBF;background:#2A3D55}
.lerr{font-size:13px;color:#B47A7A;background:rgba(180,122,122,.15);border-radius:8px;padding:9px 13px;margin-top:12px;display:none}
.lbtn{width:100%;margin-top:20px;padding:14px;background:#3D7EBF;color:#fff;border-radius:11px;font-size:15px;font-weight:800;transition:all .18s}
.lbtn:hover{background:#2D6EAF}
.lbtn:disabled{opacity:.5}

/* ── APP SHELL ── */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100%}

/* ── RAIL ── */
.rail{width:56px;background:var(--rail);display:flex;flex-direction:column;align-items:center;padding:12px 0 16px;gap:3px;flex-shrink:0;z-index:30;border-right:1px solid rgba(255,255,255,.06)}
.rmark{width:32px;height:32px;border-radius:10px;background:#3D7EBF;display:grid;place-items:center;margin-bottom:18px;font-family:'Instrument Serif',serif;font-size:14px;color:#fff;flex-shrink:0}
.rib{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;cursor:pointer;color:rgba(255,255,255,.4);transition:all .18s;position:relative;flex-shrink:0}
.rib svg{width:17px;height:17px}
.rib:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}
.rib.on{background:rgba(61,126,191,.2);color:#3D7EBF}
.rib.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:#3D7EBF;border-radius:0 3px 3px 0}
.badge{position:absolute;top:4px;right:4px;min-width:14px;height:14px;border-radius:99px;background:#D4922A;color:#fff;font-size:8.5px;font-weight:800;display:none;place-items:center;padding:0 3px;border:2px solid var(--rail)}
.rsep{width:24px;height:1px;background:rgba(255,255,255,.08);margin:5px 0}
.rib.sp{margin-top:auto}
#ava{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.15);font-size:10px;font-weight:800;cursor:pointer;color:rgba(255,255,255,.7);background:rgba(255,255,255,.08);transition:.18s}
#ava:hover{border-color:#3D7EBF}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:0 22px;height:54px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.topbar h2{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.02em;flex:1}
.tsub{font-size:12px;color:var(--muted)}
.pg{flex:1;overflow-y:auto;padding:18px 20px 40px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.pane{display:none;animation:fadeUp .3s cubic-bezier(.3,.7,.2,1)}
.pane.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── DASHBOARD ── */
#p-dash{padding:0}
.dash-layout{display:grid;grid-template-columns:1fr 280px;height:calc(100vh - 54px);overflow:hidden}
@media(max-width:900px){.dash-layout{grid-template-columns:1fr}}

/* Left column */
.dash-left{overflow-y:auto;padding:18px 18px 40px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}

/* Stat strip */
.ds-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.ds-c{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.ds-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.ds-n{font-size:22px;font-weight:800;line-height:1}
.ds-k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:2px}

/* Mini calendar */
.mini-cal-wrap{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}

/* Pending card */
.pending-wrap{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.pending-hdr{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line)}
.pending-hdr span{font-size:13px;font-weight:800;color:var(--ink)}
.pbadge{font-size:9px;font-weight:800;background:var(--amber-s);color:var(--amber);padding:2px 7px;border-radius:99px;display:none}
.view-all{margin-left:auto;font-size:12px;color:var(--blue);font-weight:700;cursor:pointer;border:none;background:none;padding:0}
.dprow{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);animation:fadeUp .3s both}
.dprow:last-child{border-bottom:none}
.dpav{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0}
.dpmeta{flex:1;min-width:0}
.dpname{font-size:13px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dpdoc{font-size:10px;font-weight:700;color:var(--blue);background:var(--blue-s);padding:1px 6px;border-radius:4px}
.dptime{font-size:11.5px;color:var(--muted);margin-top:2px}
.dpacts{display:flex;gap:6px;flex-shrink:0;align-items:center}
.dpok{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:800;background:var(--green-s);color:var(--green);transition:all .18s;border:1px solid rgba(107,158,107,.25)}
.dpok:hover{background:var(--green);color:#fff}
.dpno{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:800;background:var(--rose-s);color:var(--rose);transition:all .18s;border:1px solid rgba(180,122,122,.25)}
.dpno:hover{background:var(--rose);color:#fff}

/* Right sidebar */
.dash-right{background:var(--card2);border-left:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.dr-greeting{padding:20px 18px 16px;border-bottom:1px solid var(--line)}
.dr-greeting h3{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);line-height:1.2;margin-bottom:3px}
.dr-greeting h3 em{font-style:italic;color:var(--blue)}
.dr-sub{font-size:11.5px;color:var(--muted);margin-bottom:14px}
.admin-badge{display:inline-flex;align-items:center;background:var(--amber-s);color:var(--amber);font-size:10px;font-weight:800;padding:3px 9px;border-radius:99px;letter-spacing:.05em;margin-top:4px}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;cursor:pointer;text-align:left;transition:all .18s}
.qbtn:hover{background:rgba(61,126,191,.15);border-color:rgba(61,126,191,.3)}
.qbtn .qt{font-size:12px;font-weight:800;color:var(--ink)}
.qbtn .qs{font-size:10px;color:var(--muted);margin-top:2px}
.dr-upcoming{flex:1;padding-bottom:20px}
.dr-upcoming-hdr{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:14px 18px 8px;border-top:1px solid var(--line);margin-top:16px}
.durow{display:flex;align-items:center;gap:8px;padding:8px 18px;border-bottom:1px solid var(--line)}
.durow:last-child{border-bottom:none}
.dudot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.duname{font-size:12px;font-weight:700;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dutime{font-size:11px;color:var(--muted);flex-shrink:0}

/* ── LIGHT PANES (inbox, blocks, timings, roster, acct) ── */
.pg-light{background:var(--LP-bg);color:var(--LP-ink)}
.pg-light .bandstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.pg-light .band{background:var(--LP-card);border:1px solid var(--LP-line);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(26,51,83,.06),0 8px 24px rgba(26,51,83,.08)}
.pg-light .band .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.pg-light .band .ic svg{width:16px;height:16px}
.pg-light .band b{font-size:22px;font-weight:800;color:var(--LP-navy);line-height:1;display:block}
.pg-light .band span{font-size:10px;color:var(--LP-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-top:2px}
.pg-light .band.b1 .ic{background:#FDF0DC;color:#D4922A}
.pg-light .band.b2 .ic{background:#D8F0E8;color:#2E8B57}
.pg-light .band.b3 .ic{background:#E4EFF9;color:#3D7EBF}
.pg-light .band.b4 .ic{background:#EBF1F6;color:#8BA3BA}
.pg-light .sbox{display:flex;align-items:center;gap:10px;border:1.5px solid var(--LP-line);background:var(--LP-card);border-radius:99px;padding:10px 18px;flex:1;transition:border-color .18s}
.pg-light .sbox:focus-within{border-color:#3D7EBF}
.pg-light .sbox svg{width:15px;height:15px;color:var(--LP-faint);flex-shrink:0}
.pg-light .sbox input{flex:1;border:none;font-size:14px;color:var(--LP-ink);background:transparent}
.pg-light .sbox input::placeholder{color:var(--LP-faint)}
.srow{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.sl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--LP-muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sl span{background:#FDF0DC;color:#D4922A;padding:2px 8px;border-radius:99px;font-size:10px}
.aplist{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.empty{padding:40px 0;text-align:center;color:var(--LP-muted);font-size:14px}
.apc{background:var(--LP-card);border:1px solid var(--LP-line);border-radius:var(--r);overflow:hidden;animation:fadeUp .3s both;box-shadow:0 1px 3px rgba(26,51,83,.06),0 8px 24px rgba(26,51,83,.08)}
.apc .top{display:flex;gap:12px;align-items:flex-start;padding:14px 16px}
.ava2{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0}
.meta{flex:1;min-width:0}
.name{font-size:14px;font-weight:800;color:var(--LP-navy);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ref{font-size:10px;font-weight:700;color:var(--LP-muted);background:#EBF1F6;padding:2px 7px;border-radius:5px}
.detail{font-size:12.5px;color:var(--LP-muted);margin-top:3px}
.pill{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:4px 10px;border-radius:99px;flex-shrink:0}
.pill.pending{background:#FDF0DC;color:#D4922A}
.pill.confirmed{background:#D8F0E8;color:#2E8B57}
.pill.rejected,.pill.cancelled_by_doctor,.pill.cancelled_by_patient{background:#FAEAEA;color:#B44A4A}
.pill.rescheduled,.pill.completed,.pill.no_show{background:#EBF1F6;color:#8BA3BA}
.slotbar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--LP-bg);border-top:1px solid var(--LP-line);font-size:12.5px;color:var(--LP-muted)}
.stime{font-weight:700;color:var(--LP-navy)}
.sdoc{color:var(--LP-faint)}
.acts{display:flex;gap:8px;padding:10px 16px;background:var(--LP-card);border-top:1px solid var(--LP-line);flex-wrap:wrap;align-items:center}
.cfm{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ab{padding:7px 15px;border-radius:99px;font-size:12.5px;font-weight:700;transition:all .18s;display:inline-flex;align-items:center;gap:5px;flex-shrink:0}
.ab svg{width:13px;height:13px}
.ab.ok{background:#D8F0E8;color:#2E8B57}
.ab.ok:hover{background:#2E8B57;color:#fff}
.ab.no{background:#FAEAEA;color:#B44A4A}
.ab.no:hover{background:#B44A4A;color:#fff}
.ab.gh{background:#EBF1F6;color:#8BA3BA}
.ab.gh:hover{background:#8BA3BA;color:#fff}
.ab.yes{background:#B44A4A;color:#fff}

/* ── CALENDAR (full pane) ── */
.cal-wrap{background:var(--LP-card);border:1px solid var(--LP-line);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(26,51,83,.06)}
.cal-tb{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--LP-card);border-bottom:1px solid var(--LP-line);flex-wrap:wrap}
.cal-vtog{display:flex;background:var(--LP-bg);border-radius:9px;padding:3px;gap:2px}
.cvbtn{padding:5px 13px;border-radius:7px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--LP-muted);transition:all .18s}
.cvbtn.on{background:var(--LP-card);color:var(--LP-navy);box-shadow:0 1px 4px rgba(26,51,83,.12)}
.cal-nb{width:28px;height:28px;border-radius:8px;border:1px solid var(--LP-line);background:var(--LP-card);cursor:pointer;display:grid;place-items:center;font-size:15px;color:var(--LP-muted);transition:all .18s;flex-shrink:0}
.cal-nb:hover{background:var(--LP-navy);color:#fff;border-color:var(--LP-navy)}
.cal-rl{font-weight:800;font-size:13px;color:var(--LP-navy);min-width:170px;text-align:center;letter-spacing:-.02em}
.cal-tb-today{padding:5px 13px;border-radius:8px;border:1.5px solid var(--LP-navy);color:var(--LP-navy);background:transparent;font-size:12px;font-weight:800;cursor:pointer;transition:all .18s}
.cal-tb-today:hover{background:var(--LP-navy);color:#fff}
.cal-dpill{display:flex;align-items:center;gap:6px;background:var(--LP-navy);color:#fff;border-radius:99px;padding:4px 12px 4px 4px;font-size:11px;font-weight:700;margin-left:auto}
.cal-dpill-av{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:8px;font-weight:800}
.cal-grid{display:flex;border-top:1px solid var(--LP-line)}
.cal-gt{width:52px;flex-shrink:0;border-right:1px solid var(--LP-line);background:var(--LP-card2);position:relative}
.cal-cs{flex:1;display:flex;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 220px);min-height:400px;scrollbar-width:thin;scrollbar-color:var(--LP-line) transparent}
.cal-dc{flex:1;min-width:118px;border-right:1px solid var(--LP-line);position:relative}
.cal-dc:last-child{border-right:none}
.cal-dc.is-today{background:rgba(61,126,191,.025)}
.cal-dh{height:38px;background:var(--LP-card);border-bottom:1px solid var(--LP-line);display:flex;align-items:center;justify-content:center;gap:5px;position:sticky;top:0;z-index:5;border-right:1px solid var(--LP-line)}
.cal-dc:last-child .cal-dh{border-right:none}
.cal-dn{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--LP-muted)}
.cal-dn.today{background:var(--LP-navy);color:#fff}
.cal-dnm{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--LP-faint)}
.cal-gt-hdr{height:38px;border-bottom:1px solid var(--LP-line);background:var(--LP-card2)}
.cal-gt-lbl{position:absolute;right:6px;font-size:8.5px;font-weight:700;color:var(--LP-faint);white-space:nowrap;transform:translateY(-50%)}
.cal-gt-brk{position:absolute;right:0;left:0;display:grid;place-items:center;font-size:7px;color:var(--LP-faint);font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--LP-line);border-bottom:1px solid var(--LP-line);background:var(--LP-bg)}
.cal-hr{position:absolute;left:0;right:0;border-bottom:1px solid var(--LP-line)}
.cal-hr::after{content:'';position:absolute;left:0;right:0;top:50%;border-top:1px dashed rgba(220,232,240,.6)}
.cal-brk{position:absolute;left:0;right:0;background:repeating-linear-gradient(45deg,var(--LP-bg),var(--LP-bg) 4px,rgba(220,232,240,.5) 4px,rgba(220,232,240,.5) 8px);border-top:1px solid var(--LP-line);border-bottom:1px solid var(--LP-line)}
.cal-now{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,#3D7EBF,rgba(61,126,191,.15));z-index:8;pointer-events:none}
.cal-now::before{content:'';position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:#3D7EBF}
.cal-chip{position:absolute;left:4px;right:4px;border-radius:8px;padding:4px 7px 4px 10px;cursor:pointer;transition:all .18s;overflow:hidden;border-left:3px solid transparent;box-shadow:0 1px 3px rgba(26,51,83,.08)}
.cal-chip:hover{transform:translateY(-1px) scale(1.02);box-shadow:0 4px 12px rgba(26,51,83,.14);z-index:12}
.cal-chip.confirmed{background:linear-gradient(135deg,#C8EBD8,#B4E0C8);border-left-color:#2E8B57}
.cal-chip.confirmed .cal-chip-name{color:#1A5236}
.cal-chip.pending{background:linear-gradient(135deg,#FAE8BF,#F5D9A0);border-left-color:#D4922A}
.cal-chip.pending .cal-chip-name{color:#7A4E10}
.cal-chip.blocked{background:var(--LP-card2);border-left-color:#8BA3BA;opacity:.7}
.cal-chip-name{font-size:11px;font-weight:800;line-height:1.2;margin-bottom:1px}
.cal-chip-time{font-size:9px;font-weight:600;color:var(--LP-muted)}
.cal-chip-tag{display:inline-block;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:1px 4px;border-radius:4px;margin-top:2px;background:rgba(46,139,87,.12);color:#2E8B57}
.cal-chip.pending .cal-chip-tag{background:rgba(212,146,42,.15);color:#D4922A}
.cal-leg-bar{display:flex;gap:16px;padding:9px 16px;background:var(--LP-card2);border-top:1px solid var(--LP-line);flex-wrap:wrap}
.cal-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--LP-muted);font-weight:600}
.cal-leg-sq{width:10px;height:10px;border-radius:3px}
.cal-month-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--LP-line);background:var(--LP-card2);position:sticky;top:0;z-index:4}
.cal-month-hdr div{padding:7px 4px;text-align:center;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--LP-faint)}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mday{min-height:88px;border-right:1px solid var(--LP-line);border-bottom:1px solid var(--LP-line);padding:6px 5px;background:var(--LP-card)}
.mday:nth-child(7n){border-right:none}
.mday.other{background:var(--LP-bg)}
.mday-num{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--LP-muted);margin-bottom:3px}
.mday-num.today{background:var(--LP-navy);color:#fff}
.mday-num.this{color:var(--LP-ink)}
.mpill{font-size:9px;font-weight:700;border-radius:4px;padding:2px 5px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;border-left:2px solid}
.mpill.confirmed{background:#C8EBD8;border-color:#2E8B57;color:#1A5236}
.mpill.pending{background:#FAE8BF;border-color:#D4922A;color:#7A4E10}
.mmore{font-size:8.5px;font-weight:700;color:var(--LP-faint);padding:1px 0}

/* ── POPOVER ── */
.cpop{display:none;position:fixed;z-index:200;background:var(--LP-card);border:1px solid var(--LP-line);border-radius:16px;padding:18px 20px;box-shadow:0 8px 32px rgba(26,51,83,.2);min-width:254px;max-width:300px}
.cpop-name{font-weight:800;font-size:15px;color:var(--LP-navy);margin-bottom:2px}
.cpop-ref{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#3D7EBF;background:#E4EFF9;display:inline-block;padding:2px 8px;border-radius:5px;margin-bottom:11px}
.cpop-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:9px;font-size:12.5px;color:var(--LP-muted);line-height:1.4}
.cpop-ico{width:25px;height:25px;border-radius:7px;background:#EBF1F6;display:grid;place-items:center;font-size:12px;flex-shrink:0;margin-top:1px}
.cpop-acts{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--LP-line)}
.cpop-btn{flex:1;padding:8px 8px;border-radius:9px;font-size:12px;font-weight:800;border:none;cursor:pointer;transition:all .18s}
.cpop-ok{background:#D8F0E8;color:#2E8B57}
.cpop-ok:hover{background:#2E8B57;color:#fff}
.cpop-no{background:#FAEAEA;color:#B44A4A}
.cpop-no:hover{background:#B44A4A;color:#fff}
.cpop-x{position:absolute;top:11px;right:11px;width:23px;height:23px;border-radius:6px;border:none;background:#EBF1F6;color:#8BA3BA;cursor:pointer;font-size:13px;display:grid;place-items:center;transition:.15s}
.cpop-x:hover{background:#B44A4A;color:#fff}

/* ── FORMS / OTHER PANES ── */
.gcard{background:var(--LP-card);border:1px solid var(--LP-line);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(26,51,83,.06)}
.gcard h3{font-size:15px;font-weight:800;color:var(--LP-navy);margin-bottom:14px}
.gform{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--LP-muted);margin-bottom:6px;margin-top:12px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--LP-line);border-radius:10px;font-size:14px;color:var(--LP-ink);background:var(--LP-card2);transition:border-color .18s}
.fi:focus{border-color:#3D7EBF;background:#fff}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:700;border:1.5px solid var(--LP-line);background:var(--LP-card);color:var(--LP-muted);cursor:pointer;transition:all .18s}
.btn:hover{border-color:var(--LP-navy);color:var(--LP-navy)}
.btn.pri{background:var(--LP-navy);color:#fff;border-color:var(--LP-navy)}
.btn.pri:hover{background:#0F2035}
.btn.dng{background:#FAEAEA;color:#B44A4A;border-color:transparent}
.btn.dng:hover{background:#B44A4A;color:#fff}
.timrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--LP-card);border:1px solid var(--LP-line);border-radius:11px;padding:11px 14px;margin-bottom:8px}
.timrow b{font-size:13px;font-weight:800;color:var(--LP-navy);min-width:36px}
.sess{display:inline-flex;align-items:center;gap:5px;background:#E4EFF9;color:#3D7EBF;border-radius:6px;padding:4px 10px;font-size:12.5px;font-weight:700}
.sess button{background:none;border:none;cursor:pointer;color:#8BA3BA;font-size:12px}
.tadd{padding:5px 12px;border-radius:7px;border:1.5px dashed var(--LP-line);background:transparent;font-size:12px;color:var(--LP-muted);cursor:pointer;transition:all .18s}
.tadd:hover{border-color:#3D7EBF;color:#3D7EBF}
.rcard{background:var(--LP-card);border:1px solid var(--LP-line);border-radius:var(--r);padding:14px;animation:fadeUp .25s both;box-shadow:0 1px 3px rgba(26,51,83,.06)}
.rn{font-size:13.5px;font-weight:800;color:var(--LP-navy)}
.rs{font-size:12px;color:var(--LP-muted);margin-top:1px}
.rr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--LP-muted)}
.tchip{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px}
.tchip.g{background:#D8F0E8;color:#2E8B57}
.tchip.y{background:#FDF0DC;color:#D4922A}
.tchip.r{background:#FAEAEA;color:#B44A4A}
#rosterGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}
#modal{position:fixed;inset:0;z-index:60;display:none;place-items:center;padding:20px}
#modal.open{display:grid}
#modal .mbg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px)}
#modal .mbox{position:relative;z-index:1;background:var(--LP-card);border-radius:18px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.mslots{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.ms{padding:7px 14px;border-radius:8px;border:1.5px solid var(--LP-line);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--LP-ink)}
.ms:hover{border-color:#3D7EBF;color:#3D7EBF}
.ms.on{background:var(--LP-navy);border-color:var(--LP-navy);color:#fff}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
#mc h2{font-size:18px;font-weight:800;color:var(--LP-navy);margin-bottom:8px}
#acctInfo{display:flex;gap:16px;align-items:center;background:var(--LP-bg);border-radius:var(--r);padding:16px;margin-bottom:16px}
#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,80px);background:#1A3353;color:#fff;font-size:13.5px;font-weight:700;padding:12px 22px;border-radius:99px;transition:transform .42s cubic-bezier(.34,1.6,.4,1);z-index:70;pointer-events:none;white-space:nowrap}
#toast.show{transform:translate(-50%,0)}
@media(max-width:800px){.rail{width:50px}.ds-strip{grid-template-columns:1fr 1fr}.gform{grid-template-columns:1fr}.dash-layout{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="lmark">ௐ</div>
    <h1>Doctor <em>portal.</em></h1>
    <div class="lsub">A P Medical Center · Salem</div>
    <label class="llbl" for="lemail">Email</label>
    <input class="lfi" type="email" id="lemail" autocomplete="username" placeholder="your.name@apmedicalcenter.com">

  </div>
</div>

<!-- APP -->
<div id="app"><div class="shell">

  <!-- RAIL -->
  <div class="rail">
    <div class="rmark">AP</div>
    <button class="rib on" data-p="dash" title="Dashboard">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </button>
    <button class="rib" data-p="inbox" title="Inbox">
      <svg viewBox="0 0 24 24"><path d="M3 8l7.9 5.3a2 2 0 0 0 2.2 0L21 8M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg>
      <div class="badge" id="ribBadge"></div>
    </button>
    <button class="rib" data-p="day" title="Calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
    </button>
    <button class="rib" data-p="blocks" title="Block time">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M4.2 4.2l15.6 15.6"/></svg>
    </button>
    <button class="rib" data-p="timings" title="My timings">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h7"/><circle cx="19" cy="18" r="3"/><path d="M19 15v3l1.5 1.5"/></svg>
    </button>
    <button class="rib" data-p="roster" id="ribRoster" style="display:none" title="Roster">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.3"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5M15 15c2.3.3 4.5 1.9 4.5 4"/></svg>
    </button>
    <div class="rsep"></div>
    <button class="rib sp" data-p="acct" title="Account">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </button>
    <button class="rib" id="ava" title="Profile">--</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div><h2 id="tTitle">Dashboard</h2><div class="tsub" id="tSub"></div></div>
      <div id="tRight"></div>
    </div>

    <!-- DASHBOARD (dark, full-height layout) -->
    <div class="pane on" id="p-dash">
      <div class="dash-layout">
        <!-- Left: stats + calendar + pending -->
        <div class="dash-left">
          <div class="ds-strip" id="dStats"></div>
          <div class="mini-cal-wrap"><div id="dMiniCal"></div></div>
          <div class="pending-wrap">
            <div class="pending-hdr">
              <span>Pending requests</span>
              <div class="pbadge" id="dPendingBadge"></div>
              <button class="view-all" onclick="go('inbox')">View all →</button>
            </div>
            <div id="dPendingList"></div>
          </div>
        </div>
        <!-- Right: greeting + quick actions + upcoming -->
        <div class="dash-right">
          <div class="dr-greeting">
            <h3 id="dashGreeting">Good morning</h3>
            <div class="dr-sub" id="dashSub"></div>
            <div class="quick-grid">
              <button class="qbtn" onclick="go('day');setTimeout(renderCalendar,60)">
                <div class="qt">Calendar</div><div class="qs">Day · Week · Month</div>
              </button>
              <button class="qbtn" onclick="go('inbox')">
                <div class="qt">Inbox</div><div class="qs">Confirm or decline</div>
              </button>
              <button class="qbtn" onclick="go('blocks')">
                <div class="qt">Block time</div><div class="qs">Surgery, rounds</div>
              </button>
              <button class="qbtn" onclick="go('timings')">
                <div class="qt">My timings</div><div class="qs">OP session hours</div>
              </button>
            </div>
          </div>
          <div class="dr-upcoming">
            <div class="dr-upcoming-hdr">Upcoming today</div>
            <div id="dUpcoming"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- INBOX (light) -->
    <div class="pane" id="p-inbox">
      <div class="pg pg-light" style="padding:18px 20px 40px">
        <div class="bandstrip" id="bands"></div>
        <div class="srow">
          <div class="sbox">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            <input id="srch" placeholder="Search patient, phone or booking ref…">
          </div>
        </div>
        <div id="inboxBody"></div>
      </div>
    </div>

    <!-- CALENDAR (light) -->
    <div class="pane" id="p-day">
      <div class="pg pg-light" style="padding:18px 20px 40px">
        <div class="cal-wrap">
          <div class="cal-tb">
            <div class="cal-vtog">
              <button class="cvbtn on" id="cvDay" onclick="setCalView('day')">Day</button>
              <button class="cvbtn" id="cvWeek" onclick="setCalView('week')">Week</button>
              <button class="cvbtn" id="cvMonth" onclick="setCalView('month')">Month</button>
            </div>
            <button class="cal-nb" onclick="calNav(-1)">&#8249;</button>
            <span class="cal-rl" id="calRangeLabel"></span>
            <button class="cal-nb" onclick="calNav(1)">&#8250;</button>
            <button class="cal-tb-today" onclick="calGoToday()">Today</button>
            <div class="cal-dpill" id="calDocLabel">
              <div class="cal-dpill-av" id="calDocAv"></div>
              <span id="calDocName"></span>
            </div>
          </div>
          <div class="cal-grid">
            <div class="cal-gt" id="calGutter"><div class="cal-gt-hdr"></div></div>
            <div class="cal-cs" id="calCols"></div>
          </div>
          <div class="cal-leg-bar">
            <div class="cal-leg-item"><div class="cal-leg-sq" style="background:#2E8B57"></div>Confirmed</div>
            <div class="cal-leg-item"><div class="cal-leg-sq" style="background:#D4922A"></div>Pending</div>
            <div class="cal-leg-item"><div class="cal-leg-sq" style="background:#8BA3BA"></div>Blocked</div>
            <div class="cal-leg-item" style="margin-left:auto"><div style="width:16px;height:2px;background:#3D7EBF;border-radius:2px;margin-right:3px"></div>Now</div>
          </div>
        </div>
        <div class="cpop" id="calPopover">
          <button class="cpop-x" onclick="document.getElementById('calPopover').style.display='none'">&#215;</button>
          <div class="cpop-name" id="cpName"></div>
          <div class="cpop-ref" id="cpSpec"></div>
          <div class="cpop-row"><div class="cpop-ico">&#128197;</div><div id="cpTime"></div></div>
          <div class="cpop-row"><div class="cpop-ico">&#128222;</div><div id="cpPhone"></div></div>
          <div class="cpop-row" id="cpReasonRow" style="display:none"><div class="cpop-ico">&#128172;</div><div id="cpReason"></div></div>
          <div class="cpop-acts" id="cpActions"></div>
        </div>
      </div>
    </div>

    <!-- BLOCK TIME (light) -->
    <div class="pane" id="p-blocks">
      <div class="pg pg-light" style="padding:18px 20px 40px">
        <div class="gcard">
          <h3>Block time from patients</h3>
          <div class="gform">
            <div><label class="fl">Date</label><input class="fi" type="date" id="bDate"></div>
            <div><label class="fl">Category</label><select class="fi" id="bCat"><option value="surgery">Surgery</option><option value="rounds">Rounds</option><option value="procedure">Procedure</option><option value="personal">Personal</option><option value="other">Other</option></select></div>
            <div><label class="fl">From</label><input class="fi" type="time" id="bFrom"></div>
            <div><label class="fl">To</label><input class="fi" type="time" id="bTo"></div>
          </div>
          <label class="fl">Note (optional)</label>
          <input class="fi" type="text" id="bNote" placeholder="e.g. Liver resection — OT 2">
          <div style="margin-top:14px"><button class="btn pri" id="bSave">Block this time</button></div>
        </div>
        <div id="blockBody"></div>
      </div>
    </div>

    <!-- TIMINGS (light) -->
    <div class="pane" id="p-timings">
      <div class="pg pg-light" style="padding:18px 20px 40px">
        <div class="gcard">
          <h3>Weekly consulting sessions</h3>
          <p style="font-size:13px;color:var(--LP-muted);margin-bottom:16px">Patients see 30-minute slots inside these windows. Sunday is always closed.</p>
          <div id="timBody"></div>
        </div>
      </div>
    </div>

    <!-- ROSTER (light, admin only) -->
    <div class="pane" id="p-roster">
      <div class="pg pg-light" style="padding:18px 20px 40px">
        <div class="srow">
          <input type="date" class="fi" style="width:auto" id="roDate">
          <button class="btn" id="roToday">Today</button>
          <span id="roSum" style="font-size:13px;color:var(--LP-muted);margin-left:8px"></span>
        </div>
        <div id="rosterGrid"></div>
      </div>
    </div>

    <!-- ACCOUNT (light) -->
    <div class="pane" id="p-acct">
      <div class="pg pg-light" style="padding:18px 20px 40px">
        <div class="gcard" style="max-width:480px">
          <div id="acctInfo"></div>
          <h3>Change password</h3>
          <label class="fl">New password</label><input class="fi" type="password" id="np1" placeholder="8+ characters">
          <label class="fl">Confirm password</label><input class="fi" type="password" id="np2" placeholder="Repeat new password">
          <div style="margin-top:14px"><button class="btn pri" id="npBtn">Update password</button></div>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div></div><!-- /shell /app -->

<div id="modal"><div class="mbg"></div><div class="mbox" id="mc"></div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
var sb=supabase.createClient('https://rjceujscaepqyxdlmqyp.supabase.co','sb_publishable_OmWwOc2efyaKNiWjwVPO-A_bZRfLT0i');
var $=id=>document.getElementById(id);
var me=null,isAdmin=false,allDocs=[],TZ='Asia/Kolkata';
var PAL=[['#DFF0F0','#1A6060'],['#DBE9F5','#1A4A7A'],['#E8E4F5','#4A3A8A'],['#FDF0DC','#8A5A10'],['#D8F0E8','#1A6040'],['#F5E0E0','#7A2020']];
function pal(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))>>>0;return PAL[h%PAL.length]}
function ini(n){return(n||'').replace(/^Dr\.?\s*/i,'').split(/\s+/).filter(x=>/^[A-Za-z]/.test(x)).slice(0,2).map(x=>x[0].toUpperCase()).join('')||'?'}
function fT(iso){return new Date(iso).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:TZ})}
function fD(iso){return new Date(iso).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',timeZone:TZ})}
function fDL(iso){return new Date(iso).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',timeZone:TZ})}
function dkey(iso){return new Date(iso).toLocaleDateString('en-CA',{timeZone:TZ})}
function todayK(){return new Date().toLocaleDateString('en-CA',{timeZone:TZ})}
function toast(t){var e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2800)}
function esc(s){var d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
var EMPTY_SVG='<svg viewBox="0 0 160 32" width="120" height="24" style="display:block;margin:0 auto 12px;opacity:.3"><path d="M0 20 H50 L58 20 L65 6 L72 28 L79 12 L86 20 H160" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';

/* AUTH */
$('lbtn').addEventListener('click',doLogin);
$('lpass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function doLogin(){
  var b=$('lbtn');b.disabled=true;b.textContent='Signing in…';$('lerr').style.display='none';
  sb.auth.signInWithPassword({email:$('lemail').value.trim(),password:$('lpass').value}).then(r=>{
    b.disabled=false;b.textContent='Sign in →';
    if(r.error){$('lerr').textContent='Sign-in failed — check email and password.';$('lerr').style.display='block';return;}
    boot();
  });
}
$('ava').addEventListener('click',()=>go('acct'));
sb.auth.getSession().then(r=>{if(r.data.session)boot()});

function boot(){
  sb.from('doctors').select('*').then(r=>{
    allDocs=r.data||[];
    sb.auth.getUser().then(u=>{
      var uid=u.data.user.id;
      me=allDocs.find(d=>d.auth_user_id===uid);
      if(!me){$('lerr').textContent='No doctor profile found.';$('lerr').style.display='block';sb.auth.signOut();return;}
      isAdmin=!!me.is_admin;
      var c=pal(me.full_name);
      $('ava').textContent=ini(me.full_name);
      $('ava').style.background=c[0];$('ava').style.color=c[1];
      if(isAdmin){$('ribRoster').style.display='';$('ava').insertAdjacentHTML('afterend','');}
      $('login').style.display='none';$('app').style.display='block';
      var td=todayK();if($('roDate'))$('roDate').value=td;if($('bDate'))$('bDate').min=td;

var dashCalView='week', dashCalAnchor=new Date();dashCalAnchor.setHours(0,0,0,0);

  var DAYS_S2=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        +'<button onclick="miniCalAnchor=new Date();miniCalAnchor.setHours(0,0,0,0);renderMiniCal()" style="padding:3px 10px;border-radius:6px;border:1px solid rgba(61,126,191,.6);color:#3D7EBF;background:transparent;font-size:10px;font-weight:800;cursor:pointer">Today</button>'
      +'</div>'
      +'<div style="display:flex;overflow:auto;max-height:320px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent">'
        +'<div style="width:38px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.08);position:relative;height:'+TH+'px">'+gutHtml+'</div>'
        +'<div style="flex:1;display:flex;min-width:0">'+colsHtml+'</div>'
      +'</div>';
  });
}


/* ─── CALENDAR ─── */
var calView='day',calAnchor=new Date();
calAnchor.setHours(0,0,0,0);
var DAYS_S=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYS_L=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS_C=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MONTHS_L=['January','February','March','April','May','June','July','August','September','October','November','December'];
var CAL_HDR=42,HOUR_H=56,BREAK_H=18;
var MOR_S=10,MOR_E=14,EVE_S=18,EVE_E=21;

function calY(iso){
  var d=new Date(iso),h=d.getHours(),m=d.getMinutes();
  if(h>=MOR_S&&h<MOR_E) return CAL_HDR+(h-MOR_S)*HOUR_H+m/60*HOUR_H;
  if(h>=EVE_S&&h<EVE_E) return CAL_HDR+(MOR_E-MOR_S)*HOUR_H+BREAK_H+(h-EVE_S)*HOUR_H+m/60*HOUR_H;
  return -1;
}
function calTH(){return CAL_HDR+(MOR_E-MOR_S)*HOUR_H+BREAK_H+(EVE_E-EVE_S)*HOUR_H;}

function buildGutter(){
  var g=$('calGutter');if(!g)return;
  g.innerHTML='<div class="cal-gt-hdr"></div>';
  g.style.height=calTH()+'px';
  var top=CAL_HDR;
  for(var hr=MOR_S;hr<MOR_E;hr++){
    var lbl=document.createElement('div');lbl.className='cal-gt-lbl';lbl.style.top=top+'px';lbl.textContent=hr+':00';g.appendChild(lbl);top+=HOUR_H;
  }
  var brk=document.createElement('div');brk.className='cal-gt-brk';brk.style.cssText='top:'+top+'px;height:'+BREAK_H+'px';brk.textContent='break';g.appendChild(brk);top+=BREAK_H;
  for(var hr=EVE_S;hr<EVE_E;hr++){
    var lbl=document.createElement('div');lbl.className='cal-gt-lbl';lbl.style.top=top+'px';lbl.textContent=hr+':00';g.appendChild(lbl);top+=HOUR_H;
  }
}

function buildCol(date,appts,blocks){
  var TH=calTH(),isToday=date.toDateString()===new Date().toDateString();
  var col=document.createElement('div');
  col.className='cal-dc'+(isToday?' is-today':'');col.style.height=TH+'px';
  var hdr=document.createElement('div');hdr.className='cal-dh';
  hdr.innerHTML='<div class="cal-dn'+(isToday?' today':'')+'">'+date.getDate()+'</div><div class="cal-dnm">'+DAYS_S[date.getDay()]+'</div>';
  col.appendChild(hdr);
  var y=CAL_HDR;
  for(var hr=MOR_S;hr<MOR_E;hr++){var row=document.createElement('div');row.className='cal-hr';row.style.cssText='top:'+y+'px;height:'+HOUR_H+'px';col.appendChild(row);y+=HOUR_H;}
  var b2=document.createElement('div');b2.className='cal-brk';b2.style.cssText='top:'+y+'px;height:'+BREAK_H+'px';col.appendChild(b2);y+=BREAK_H;
  for(var hr=EVE_S;hr<EVE_E;hr++){var row=document.createElement('div');row.className='cal-hr';row.style.cssText='top:'+y+'px;height:'+HOUR_H+'px';col.appendChild(row);y+=HOUR_H;}
  if(isToday){var ny=calY(new Date().toISOString());if(ny>0){var nl=document.createElement('div');nl.className='cal-now';nl.style.top=ny+'px';col.appendChild(nl);}}
  appts.forEach(function(a){
    var ty=calY(a.slot_start),by=calY(a.slot_end);if(ty<0)return;
    var h=Math.max(28,by-ty),chip=document.createElement('div');
    chip.className='cal-chip '+a.status;chip.style.cssText='top:'+ty+'px;height:'+h+'px';
    var t=new Date(a.slot_start).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true});
    chip.innerHTML='<div class="cal-chip-name">'+esc(a.patient_name)+'</div><div class="cal-chip-time">'+t+'</div>'+(h>44?'<div class="cal-chip-tag">'+a.status.replace(/_/g,' ')+'</div>':'');
    chip.addEventListener('click',function(e){e.stopPropagation();showPop(a,e);});
    col.appendChild(chip);
  });
  (blocks||[]).forEach(function(b){
    var iso=date.toISOString().slice(0,10);
    var ty=calY(iso+'T'+b.from_time),by=calY(iso+'T'+b.to_time);if(ty<0)return;
    var chip=document.createElement('div');chip.className='cal-chip blocked';
    chip.style.cssText='top:'+ty+'px;height:'+Math.max(28,by-ty)+'px';
    chip.innerHTML='<div class="cal-chip-name" style="font-size:10px">\uD83D\uDD12 '+esc(b.category||'Blocked')+'</div>';
    col.appendChild(chip);
  });
  return col;
}

function buildMonthView(dates,appts){
  var cols=$('calCols'),gt=$('calGutter');
  if(gt){gt.innerHTML='';gt.style.cssText='width:0;display:none';}
  cols.style.cssText='flex:1;display:block;width:100%;overflow-y:auto;max-height:calc(100vh - 200px)';
  var hdrRow=document.createElement('div');hdrRow.className='cal-month-hdr';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(function(d){var cell=document.createElement('div');cell.textContent=d;hdrRow.appendChild(cell);});
  cols.appendChild(hdrRow);
  var grid=document.createElement('div');grid.className='cal-month-grid';
  var today=new Date();today.setHours(0,0,0,0);var curMonth=calAnchor.getMonth();
  dates.forEach(function(cellDate){
    var iso=cellDate.toISOString().slice(0,10);
    var isThisMonth=cellDate.getMonth()===curMonth,isToday2=cellDate.toDateString()===today.toDateString();
    var cell=document.createElement('div');cell.className='mday'+(isThisMonth?'':' other');
    var numEl=document.createElement('div');numEl.className='mday-num'+(isToday2?' today':(isThisMonth?' this':''));
    numEl.textContent=cellDate.getDate();cell.appendChild(numEl);
    var dayAppts=appts.filter(function(a){return a.slot_start.slice(0,10)===iso;});
    var maxShow=isThisMonth?3:1;
    dayAppts.slice(0,maxShow).forEach(function(a){
      var t=new Date(a.slot_start).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true});
      var pill=document.createElement('div');pill.className='mpill '+a.status;
      pill.textContent=t+' '+esc(a.patient_name);pill.title=a.patient_name+' · '+t;
      pill.addEventListener('click',function(e){e.stopPropagation();showPop(a,e);});cell.appendChild(pill);
    });
    if(dayAppts.length>maxShow){var more=document.createElement('div');more.className='mmore';more.textContent='+'+(dayAppts.length-maxShow)+' more';cell.appendChild(more);}
    grid.appendChild(cell);
  });
  cols.appendChild(grid);
}

window.setCalView=function(v){
  calView=v;
  document.getElementById('cvDay').classList.toggle('on',v==='day');
  document.getElementById('cvWeek').classList.toggle('on',v==='week');
  document.getElementById('cvMonth').classList.toggle('on',v==='month');
  renderCalendar();
};
window.calNav=function(dir){
  var d=new Date(calAnchor);
  if(calView==='day') d.setDate(d.getDate()+dir);
  else if(calView==='week') d.setDate(d.getDate()+dir*7);
  else d.setMonth(d.getMonth()+dir);
  calAnchor=d;renderCalendar();
};
window.calGoToday=function(){calAnchor=new Date();calAnchor.setHours(0,0,0,0);renderCalendar();};

function renderCalendar(){
  if(!me)return;
  var pill=$('calDocLabel');
  if(pill){pill.style.display='flex';$('calDocAv').textContent=ini(me.full_name);$('calDocName').textContent=me.full_name;}
  var cols=$('calCols'),gt=$('calGutter');if(!cols)return;
  cols.innerHTML='';
  if(calView==='month'){
    if(gt)gt.style.cssText='width:0;display:none';
    cols.style.cssText='flex:1;display:block;width:100%';
  } else {
    if(gt)gt.style.cssText='width:56px;flex-shrink:0;border-right:1px solid var(--line);background:var(--card2);position:relative;display:block';
    cols.style.cssText='flex:1;display:flex;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 240px);min-height:'+calTH()+'px;scrollbar-width:thin';
    buildGutter();
  }
  var dates=[],rangeLabel='';
  if(calView==='day'){
    dates=[new Date(calAnchor)];
    rangeLabel=DAYS_L[calAnchor.getDay()]+', '+calAnchor.getDate()+' '+MONTHS_L[calAnchor.getMonth()]+' '+calAnchor.getFullYear();
  } else if(calView==='week'){
    var mon=new Date(calAnchor),dow=mon.getDay()||7;mon.setDate(mon.getDate()-(dow-1));
    for(var i=0;i<6;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);dates.push(x);}
    rangeLabel=dates[0].getDate()+' '+MONTHS_C[dates[0].getMonth()]+' \u2013 '+dates[5].getDate()+' '+MONTHS_C[dates[5].getMonth()]+' '+dates[5].getFullYear();
  } else {
    var firstDay=new Date(calAnchor.getFullYear(),calAnchor.getMonth(),1);
    var startDow=firstDay.getDay()||7;var gridStart=new Date(firstDay);gridStart.setDate(firstDay.getDate()-(startDow-1));
    for(var i=0;i<42;i++){var x=new Date(gridStart);x.setDate(gridStart.getDate()+i);dates.push(x);}
    rangeLabel=MONTHS_L[calAnchor.getMonth()]+' '+calAnchor.getFullYear();
  }
  $('calRangeLabel').textContent=rangeLabel;
  var from=dates[0].toISOString().slice(0,10)+'T00:00:00';
  var to=dates[dates.length-1].toISOString().slice(0,10)+'T23:59:59';
  var q=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id').gte('slot_start',from).lte('slot_start',to).in('status',['pending','confirmed','rescheduled']).order('slot_start');
  if(!isAdmin)q=q.eq('doctor_id',me.id);
  var bq=sb.from('slot_blocks').select('from_time,to_time,block_date,category,note').gte('block_date',dates[0].toISOString().slice(0,10)).lte('block_date',dates[dates.length-1].toISOString().slice(0,10));
  if(!isAdmin)bq=bq.eq('doctor_id',me.id);
  Promise.all([q,bq]).then(function(res){
    var appts=res[0].data||[],blocks=res[1].data||[];
    if(calView==='month'){
      buildMonthView(dates,appts);
    } else {
      dates.forEach(function(d){
        var iso=d.toISOString().slice(0,10);
        cols.appendChild(buildCol(d,appts.filter(function(a){return a.slot_start.slice(0,10)===iso;}),blocks.filter(function(b){return b.block_date===iso;})));
      });
    }
  });
}

function showPop(a,e){
  var pop=$('calPopover');if(!pop)return;
  var t=new Date(a.slot_start).toLocaleString('en-IN',{weekday:'short',day:'numeric',month:'short',hour:'numeric',minute:'2-digit',hour12:true});
  $('cpName').textContent=a.patient_name;
  $('cpSpec').textContent=(a.booking_ref||'\u2014')+' \u00b7 '+a.status.replace(/_/g,' ').toUpperCase();
  $('cpTime').innerHTML='<strong>'+t+'</strong>';
  $('cpPhone').innerHTML='<a href="tel:+91'+a.patient_phone+'" style="color:var(--blue);font-weight:700;text-decoration:none">+91 '+a.patient_phone+'</a>';
  var rr=$('cpReasonRow');
  if(a.reason){rr.style.display='flex';$('cpReason').textContent=a.reason;}else rr.style.display='none';
  var acts='';
  if(a.status==='pending') acts='<button class="cpop-btn cpop-ok" onclick="calConfirm(\''+a.id+'\')">Confirm</button><button class="cpop-btn cpop-no" onclick="calDecline(\''+a.id+'\')">Decline</button>';
  if(a.status==='confirmed') acts='<button class="cpop-btn cpop-no" onclick="calDecline(\''+a.id+'\')">Cancel</button>';
  $('cpActions').innerHTML=acts;
  var tgt=e.target.closest?e.target.closest('.cal-chip')||e.target:e.target;
  var r=tgt.getBoundingClientRect?tgt.getBoundingClientRect():{bottom:e.clientY+6,right:e.clientX+8};
  pop.style.cssText='display:block;top:'+Math.min(r.bottom+6,window.innerHeight-300)+'px;left:'+Math.min(r.right+8,window.innerWidth-310)+'px';
}
window.calConfirm=function(id){
  sb.from('appointments').update({status:'confirmed'}).eq('id',id).then(function(){$('calPopover').style.display='none';renderCalendar();loadInbox();});
};
window.calDecline=function(id){
  if(!confirm('Cancel this appointment?'))return;
  sb.from('appointments').update({status:'cancelled_by_doctor'}).eq('id',id).then(function(){$('calPopover').style.display='none';renderCalendar();loadInbox();});
};
document.addEventListener('click',function(e){
  var pop=$('calPopover');
  if(pop&&pop.style.display==='block'&&!pop.contains(e.target)&&!e.target.closest('.cal-chip'))pop.style.display='none';
});

})();</script>
