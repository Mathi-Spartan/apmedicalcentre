<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Doctor Portal — A P Medical Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F6F4;--card:#FFFFFF;--ink:#16201C;--muted:#5A6862;--faint:#90A099;
  --pea:#0B4F43;--pea-d:#083830;--pea-s:#E2EFE9;--pea-g:#EEF7F2;
  --mari:#D4922A;--mari-s:#FDF0DC;
  --rose:#B04040;--rose-s:#FAEAEA;
  --blue:#2B5FA8;--blue-s:#E6EEFA;
  --lav:#6253B0;--lav-s:#EEEAFA;
  --teal:#1A7D6B;--teal-s:#E2F5F0;
  --line:#E2E7E3;--ln2:#F0F3F0;
  --sh:0 1px 3px rgba(16,30,20,.06),0 8px 24px -10px rgba(16,30,20,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Instrument Serif',serif;font-weight:400}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ─── LOGIN ─── */
#login{min-height:100vh;display:grid;place-items:center;padding:20px;
  background:radial-gradient(600px 400px at 90% 0%,rgba(212,146,42,.12),transparent 60%),
  radial-gradient(700px 500px at -5% 110%,rgba(11,79,67,.10),transparent 65%),var(--paper)}
#login .box{width:100%;max-width:390px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:36px 32px;box-shadow:var(--sh);animation:popIn .5s cubic-bezier(.34,1.6,.4,1)}
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.logmark{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--pea),var(--pea-d));display:grid;place-items:center;color:#F3D9A8;font-family:'Instrument Serif';font-size:22px;margin-bottom:15px}
#login h1{font-size:26px}#login h1 em{color:var(--pea);font-style:italic}
#login .sub{font-size:12.5px;color:var(--muted);margin:3px 0 22px}
.fl{display:block;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:12px 0 5px}
.fi{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:14px;background:var(--paper);color:var(--ink);transition:border-color .2s,box-shadow .2s}
.fi:focus{outline:none;border-color:var(--pea);box-shadow:0 0 0 4px var(--pea-s)}
.lerr{display:none;background:var(--rose-s);color:var(--rose);border-radius:10px;padding:10px 13px;font-size:12.5px;font-weight:700;margin-top:12px}
.lbtn{width:100%;margin-top:18px;padding:13px;border:none;border-radius:11px;background:var(--pea);color:#fff;font-size:14.5px;font-weight:800;transition:background .18s}
.lbtn:hover{background:var(--pea-d)}.lbtn:disabled{opacity:.6;cursor:wait}

/* ─── APP SHELL ─── */
#app{display:none;min-height:100vh;display:none}
.shell{display:flex;min-height:100vh}

/* sidebar */
.rail{position:sticky;top:0;height:100vh;flex:0 0 72px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:16px 0 20px;gap:4px;z-index:30}
.railmark{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,var(--pea),var(--pea-d));display:grid;place-items:center;color:#F3D9A8;font-family:'Instrument Serif';font-size:18px;margin-bottom:18px}
.rib{width:46px;height:46px;border-radius:13px;border:none;background:none;color:var(--faint);display:grid;place-items:center;position:relative;transition:background .18s,color .18s;flex:none}
.rib svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.rib:hover{background:var(--paper);color:var(--ink)}
.rib.on{background:var(--pea-s);color:var(--pea)}
.rib .badge{position:absolute;top:6px;right:6px;min-width:17px;height:17px;border-radius:99px;background:var(--mari);color:#fff;font-size:10px;font-weight:800;display:none;place-items:center;padding:0 3px;font-family:'Figtree'}
.rib .tip{position:absolute;left:58px;top:50%;transform:translateY(-50%) scale(.92) translateX(-4px);background:var(--ink);color:#fff;font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:.18s;transform-origin:left center}
.rib:hover .tip{opacity:1;transform:translateY(-50%) scale(1) translateX(0)}
.ava{margin-top:auto;width:36px;height:36px;border-radius:50%;background:var(--pea-s);color:var(--pea);display:grid;place-items:center;font-size:12px;font-weight:800;border:none;cursor:pointer}

/* topbar */
.topbar{position:sticky;top:0;z-index:20;background:rgba(244,246,244,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:14px}
.topbar h2{font-size:23px}.topbar .tsub{font-size:12px;color:var(--faint)}
.topbar .tright{margin-left:auto;display:flex;gap:8px}
.btn{border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;transition:.18s}
.btn:hover{border-color:var(--pea);color:var(--pea)}
.btn.pri{background:var(--pea);border-color:var(--pea);color:#fff}
.btn.pri:hover{background:var(--pea-d)}
.btn.dng{color:var(--rose)}.btn.dng:hover{border-color:var(--rose);background:var(--rose-s)}

.pg{padding:24px 28px 90px;flex:1;min-width:0}
.pane{display:none;animation:fadeUp .3s ease}
.pane.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ─── INBOX ─── */
.bandstrip{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.band{border-radius:14px;padding:14px 16px;flex:1;min-width:130px;position:relative;overflow:hidden}
.band .ic{position:absolute;right:12px;top:12px;opacity:.7}
.band .ic svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.band b{display:block;font-size:28px;font-weight:800;line-height:1}
.band span{font-size:11.5px;font-weight:700;display:block;margin-top:4px}
.band.b1{background:var(--mari-s);color:var(--mari)}
.band.b2{background:var(--pea-s);color:var(--pea)}
.band.b3{background:var(--blue-s);color:var(--blue)}
.band.b4{background:var(--lav-s);color:var(--lav)}

/* section label */
.sl{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.sl::after{content:'';flex:1;height:1px;background:var(--line)}

/* ─── APPOINTMENT CARD ─── */
.aplist{display:flex;flex-direction:column;gap:10px}
.apc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:0;overflow:hidden;box-shadow:0 1px 3px rgba(16,30,20,.04);animation:fadeUp .35s ease both;transition:box-shadow .2s}
.apc:hover{box-shadow:var(--sh)}
.apc .top{display:flex;align-items:center;gap:14px;padding:16px 18px}
.apc .ava2{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:800;flex:none}
.apc .meta{flex:1;min-width:0}
.apc .meta .name{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.apc .meta .name .ref{font-size:10.5px;font-weight:800;letter-spacing:.05em;color:var(--pea);background:var(--pea-g);padding:3px 9px;border-radius:99px}
.apc .meta .detail{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5}
.apc .pill{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:5px 12px;border-radius:99px;flex:none}
.pill.pending{background:var(--mari-s);color:var(--mari)}
.pill.confirmed{background:var(--pea-s);color:var(--pea)}
.pill.rejected,.pill.cancelled_by_doctor,.pill.cancelled_by_patient{background:var(--rose-s);color:var(--rose)}
.pill.rescheduled{background:var(--lav-s);color:var(--lav)}
.pill.completed,.pill.no_show{background:var(--ln2);color:var(--faint)}
/* slot bar */
.apc .slotbar{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--ln2);border-top:1px solid var(--line)}
.slotbar .stime{font-size:13.5px;font-weight:800;color:var(--ink)}
.slotbar .sdoc{font-size:12.5px;color:var(--muted);flex:1}
/* actions */
.apc .acts{display:flex;gap:8px;padding:12px 18px;background:var(--card);border-top:1px solid var(--line);flex-wrap:wrap;align-items:center}
.ab{border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:800;border:1.5px solid var(--line);background:var(--card);color:var(--ink);transition:.18s;display:inline-flex;align-items:center;gap:6px}
.ab.ok{background:var(--pea);border-color:var(--pea);color:#fff}
.ab.ok:hover{background:var(--pea-d)}
.ab.no{border-color:var(--line);color:var(--rose)}
.ab.no:hover{border-color:var(--rose);background:var(--rose-s)}
.ab.gh:hover{border-color:var(--pea);color:var(--pea)}
.ab.ok svg,.ab svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex:none}
.cfm{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cfm span{font-size:13px;font-weight:800;color:var(--rose)}
.ab.yes{background:var(--rose);border-color:var(--rose);color:#fff}
.ab.yes:hover{background:#8B3232}

/* search */
.srow{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.sbox{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);background:var(--card);border-radius:99px;padding:10px 16px;flex:1;min-width:220px}
.sbox svg{width:16px;height:16px;fill:none;stroke:var(--faint);stroke-width:2;stroke-linecap:round;flex:none}
.sbox input{border:none;background:none;outline:none;font-size:13.5px;flex:1;color:var(--ink)}
.sbox:focus-within{border-color:var(--pea)}

/* empty */
.empty{text-align:center;padding:56px 24px;color:var(--faint);background:var(--card);border:1.5px dashed var(--line);border-radius:16px}
.empty .ecgwrap svg{display:block;margin:0 auto 14px}
.empty p{font-size:14px}

/* ─── MY DAY (timeline) ─── */
.dayrow{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.dayrow:last-child{border-bottom:none}
.dtime{min-width:68px;text-align:right}
.dtime b{display:block;font-size:14px;font-weight:800}
.dtime span{font-size:11px;color:var(--faint);font-weight:700}
.dbar{width:3px;border-radius:3px;align-self:stretch;flex:none}
.dbar.pending{background:var(--mari)}.dbar.confirmed{background:var(--pea)}.dbar.blocked{background:var(--faint)}
.dcontent{flex:1}
.dcontent b{display:block;font-size:14px;font-weight:800}
.dcontent span{font-size:12.5px;color:var(--muted)}

/* ─── SHARED ─── */
.gcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:14px}
.gform{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;align-items:end}
.timrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 16px;margin-bottom:8px}
.timrow b{width:42px;font-size:13px;font-weight:800}
.sess{font-size:13px;background:var(--pea-g);color:var(--pea-d);font-weight:700;padding:5px 12px;border-radius:99px;display:inline-flex;gap:7px;align-items:center}
.sess button{border:none;background:none;color:var(--rose);font-weight:800;font-size:12px;cursor:pointer}
.timrow .tadd{margin-left:auto}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.rcard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:16px;animation:fadeUp .35s ease both}
.rcard .rn{font-size:14px;font-weight:800}.rcard .rs{font-size:10.5px;color:var(--faint);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.rcard .rr{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;color:var(--muted)}
.tchip{font-size:10.5px;font-weight:800;border-radius:99px;padding:2px 9px}
.tchip.g{background:var(--pea-s);color:var(--pea-d)}.tchip.y{background:var(--mari-s);color:var(--mari)}.tchip.r{background:var(--rose-s);color:var(--rose)}

/* modal */
#modal{position:fixed;inset:0;z-index:60;display:none;place-items:center;padding:20px}
#modal.open{display:grid}
#modal .mbg{position:absolute;inset:0;background:rgba(16,30,20,.44);backdrop-filter:blur(5px)}
#modal .mc{position:relative;background:var(--card);border-radius:20px;max-width:440px;width:100%;padding:26px;box-shadow:var(--sh);animation:popIn .4s cubic-bezier(.34,1.6,.4,1);max-height:88vh;overflow:auto}
#modal h2{font-size:22px;margin-bottom:14px}
.mslots{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:8px 0 14px}
.ms{padding:9px 4px;text-align:center;border:1.5px solid var(--line);border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer;transition:.18s}
.ms:hover{border-color:var(--pea)}.ms.on{background:var(--pea);color:#fff;border-color:var(--pea)}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* toast */
.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,80px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:700;padding:13px 22px;border-radius:99px;transition:transform .42s cubic-bezier(.34,1.6,.4,1);z-index:70;pointer-events:none}
.toast.show{transform:translate(-50%,0)}

@media(max-width:700px){
  .rail{flex:0 0 58px}.rib .tip{display:none}
/* calendar */
/* ── CALENDAR MODERN GLASS ── */
.cal-shell{background:linear-gradient(145deg,#f0f7f4 0%,#faf8f3 60%,#f3efe8 100%);border-radius:22px;overflow:hidden;border:1px solid rgba(14,83,72,.1);box-shadow:0 2px 8px rgba(23,33,29,.06),0 20px 60px -20px rgba(14,83,72,.12)}
.cal-toolbar{display:flex;align-items:center;gap:10px;padding:14px 18px;background:rgba(255,255,255,.7);backdrop-filter:blur(20px);border-bottom:1px solid rgba(14,83,72,.08);flex-wrap:wrap}
.cal-view-toggle{display:flex;background:rgba(14,83,72,.07);border-radius:10px;padding:3px;gap:2px}
.cal-vbtn{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s;font-family:'Figtree';letter-spacing:.02em}
.cal-vbtn.on{background:#fff;color:var(--pea);box-shadow:0 1px 6px rgba(14,83,72,.15),0 0 0 1px rgba(14,83,72,.08)}
.cal-nav-btn{width:32px;height:32px;border-radius:9px;border:1px solid rgba(14,83,72,.12);background:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);transition:all .18s;backdrop-filter:blur(8px)}
.cal-nav-btn:hover{background:var(--pea);color:#fff;border-color:var(--pea);box-shadow:0 4px 12px -4px rgba(14,83,72,.4)}
.cal-range{font-weight:800;font-size:14px;color:var(--ink);min-width:180px;text-align:center;letter-spacing:-.02em}
.cal-today-btn{padding:6px 16px;border-radius:9px;border:1.5px solid var(--pea);color:var(--pea);background:transparent;font-size:12px;font-weight:800;cursor:pointer;font-family:'Figtree';transition:all .18s}
.cal-today-btn:hover{background:var(--pea);color:#fff;box-shadow:0 4px 12px -4px rgba(14,83,72,.4)}
.cal-doc-pill{display:flex;align-items:center;gap:7px;background:var(--pea);color:#fff;border-radius:99px;padding:5px 14px 5px 6px;font-size:11.5px;font-weight:700;margin-left:auto}
.cal-doc-av{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800}
/* grid */
.cal-grid-wrap{display:flex;position:relative;overflow:hidden}
.cal-gutter{width:56px;flex-shrink:0;border-right:1px solid rgba(14,83,72,.07);background:rgba(255,255,255,.5);position:relative;z-index:2}
.cal-cols-scroll{flex:1;display:flex;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 260px);min-height:420px;scrollbar-width:thin;scrollbar-color:rgba(14,83,72,.15) transparent}
.cal-cols-scroll::-webkit-scrollbar{width:4px;height:4px}
.cal-cols-scroll::-webkit-scrollbar-thumb{background:rgba(14,83,72,.2);border-radius:4px}
/* day column */
.cal-col{flex:1;min-width:120px;border-right:1px solid rgba(14,83,72,.06);position:relative}
.cal-col:last-child{border-right:none}
.cal-col-today{background:rgba(14,83,72,.02)}
/* day header */
.cal-day-hdr{height:42px;background:rgba(255,255,255,.6);backdrop-filter:blur(12px);border-bottom:1px solid rgba(14,83,72,.08);display:flex;align-items:center;justify-content:center;gap:7px;position:sticky;top:0;z-index:5}
.cal-dnum{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted);transition:all .2s}
.cal-dnum.today{background:var(--pea);color:#fff;box-shadow:0 4px 10px -3px rgba(14,83,72,.45)}
.cal-dname{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
/* time rows */
.cal-hour-row{height:56px;border-bottom:1px solid rgba(14,83,72,.05);position:relative}
.cal-half-mark{position:absolute;left:0;right:0;top:50%;border-top:1px dashed rgba(14,83,72,.04)}
.cal-break-row{height:22px;background:repeating-linear-gradient(45deg,rgba(14,83,72,.03),rgba(14,83,72,.03) 4px,transparent 4px,transparent 9px);border-top:1px solid rgba(14,83,72,.06);border-bottom:1px solid rgba(14,83,72,.06)}
/* appointment chips */
.cal-appt{position:absolute;left:5px;right:5px;border-radius:11px;padding:6px 9px;cursor:pointer;transition:all .2s cubic-bezier(.3,.7,.2,1);overflow:hidden;box-shadow:0 2px 8px -2px rgba(23,33,29,.1)}
.cal-appt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:11px 0 0 11px}
.cal-appt:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 20px -6px rgba(23,33,29,.2);z-index:20}
.cal-appt.confirmed{background:linear-gradient(135deg,rgba(227,239,235,.95),rgba(209,231,223,.95));backdrop-filter:blur(8px)}
.cal-appt.confirmed::before{background:var(--pea)}
.cal-appt.pending{background:linear-gradient(135deg,rgba(251,240,220,.95),rgba(248,228,190,.95));backdrop-filter:blur(8px)}
.cal-appt.pending::before{background:var(--mari)}
.cal-appt.blocked{background:rgba(240,237,229,.7);backdrop-filter:blur(4px)}
.cal-appt.blocked::before{background:#C3BFB5}
.cal-appt.rescheduled,.cal-appt.completed{background:rgba(245,243,239,.8)}
.cal-appt.rescheduled::before,.cal-appt.completed::before{background:#B0ADA7}
.cal-appt .an{font-size:11.5px;font-weight:800;line-height:1.25;color:var(--ink);padding-left:6px}
.cal-appt .at{font-size:10px;margin-top:2px;color:var(--muted);font-weight:600;padding-left:6px}
.cal-appt .ast{display:inline-block;font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:5px;margin-top:3px;margin-left:6px}
.cal-appt.confirmed .ast{background:rgba(14,83,72,.12);color:var(--pea)}
.cal-appt.pending .ast{background:rgba(232,161,61,.18);color:var(--mari-deep,#C97F1E)}
/* now line */
.cal-now{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--rose),rgba(180,84,76,.3));z-index:10;pointer-events:none}
.cal-now::before{content:'';position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--rose);box-shadow:0 0 0 3px rgba(180,84,76,.2),0 0 0 6px rgba(180,84,76,.08)}
/* legend */
.cal-legend{display:flex;gap:18px;padding:12px 18px;background:rgba(255,255,255,.5);backdrop-filter:blur(8px);border-top:1px solid rgba(14,83,72,.06);flex-wrap:wrap}
.cal-leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:600}

.cal-pop-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid rgba(14,83,72,.08)}

.cal-pop-confirm{background:var(--pea);color:#fff}

.cal-pop-cancel{background:var(--rose-soft,#F9ECE9);color:var(--rose)}

.cal-pop-close{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:7px;border:none;background:rgba(14,83,72,.07);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s}
.cal-pop-close:hover{background:var(--rose);color:#fff}
/* gutter time labels */
.cal-gutter-lbl{position:absolute;right:10px;font-size:9.5px;font-weight:700;color:var(--muted);white-space:nowrap;transform:translateY(-50%);letter-spacing:.02em}

  .pg{padding:16px 14px 90px}.topbar{padding:12px 14px}

}

<script>
(function(){
var sb=supabase.createClient('https://rjceujscaepqyxdlmqyp.supabase.co','sb_publishable_OmWwOc2efyaKNiWjwVPO-A_bZRfLT0i');
var $=id=>document.getElementById(id);
var me=null,isAdmin=false,allDocs=[],TZ='Asia/Kolkata';
var PAL=[['#E2EFE9','#0B4F43'],['#E6EEFA','#2B5FA8'],['#EEEAFA','#6253B0'],['#FDF0DC','#D4922A'],['#E2F5F0','#1A7D6B'],['#FAEAEA','#B04040']];
function pal(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))>>>0;return PAL[h%PAL.length]}
function ini(n){return(n||'').replace(/^Dr\.?\s*/i,'').split(/\s+/).filter(x=>/^[A-Za-z]/.test(x)).slice(0,2).map(x=>x[0].toUpperCase()).join('')||'?'}
function fT(iso){return new Date(iso).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:TZ})}
function fD(iso){return new Date(iso).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',timeZone:TZ})}
function fDL(iso){return new Date(iso).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',timeZone:TZ})}
function dkey(iso){return new Date(iso).toLocaleDateString('en-CA',{timeZone:TZ})}
function todayK(){return new Date().toLocaleDateString('en-CA',{timeZone:TZ})}
function toast(t){var e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2800)}
function esc(s){var d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
var EMPTY_ECG=`<svg viewBox="0 0 160 32" width="160" height="32" style="display:block;margin:0 auto 12px"><path d="M0 20 H50 L58 20 L65 6 L72 28 L79 12 L86 20 H160" fill="none" stroke="#0B4F43" stroke-width="1.8" stroke-linecap="round" opacity=".35"><animate attributeName="d" dur="4s" repeatCount="indefinite" values="M0 20 H50 L58 20 L65 6 L72 28 L79 12 L86 20 H160;M0 20 H50 L58 20 L65 19 L72 21 L79 20 L86 20 H160;M0 20 H50 L58 20 L65 6 L72 28 L79 12 L86 20 H160"/></path></svg>`;

/* ── AUTH ── */
$('lbtn').addEventListener('click',doLogin);
$('lpass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function doLogin(){
  var b=$('lbtn');b.disabled=true;b.textContent='Signing in…';$('lerr').style.display='none';
  sb.auth.signInWithPassword({email:$('lemail').value.trim(),password:$('lpass').value}).then(r=>{
    b.disabled=false;b.textContent='Sign in →';
    if(r.error){$('lerr').textContent='Sign-in failed — check your email and password.';$('lerr').style.display='block';return;}
    boot();
  });
}
$('ava').addEventListener('click',()=>go('acct'));
$('btnOut')&&$('btnOut').addEventListener('click',()=>sb.auth.signOut().then(()=>location.reload()));
sb.auth.getSession().then(r=>{if(r.data.session)boot()});

function boot(){
  sb.from('doctors').select('*').then(r=>{
    allDocs=r.data||[];
    sb.auth.getUser().then(u=>{
      var uid=u.data.user.id;
      me=allDocs.find(d=>d.auth_user_id===uid);
      if(!me){$('lerr').textContent='No doctor profile found for this account.';$('lerr').style.display='block';sb.auth.signOut();return;}
      isAdmin=!!me.is_admin;
      var c=pal(me.full_name);
      $('ava').textContent=ini(me.full_name);
      $('ava').style.background=c[0];$('ava').style.color=c[1];
      if(isAdmin)$('ribRoster').style.display='';
      $('login').style.display='none';$('app').style.display='block';
      var td=todayK();if($('roDate'))$('roDate').value=td;if($('bDate'))$('bDate').min=td;
      $('acctInfo').innerHTML=`<div class="ava" style="background:${c[0]};color:${c[1]};width:52px;height:52px;font-size:15px;border-radius:50%;display:grid;place-items:center;font-weight:800;flex:none">${ini(me.full_name)}</div><div><b style="font-size:15px;display:block">${esc(me.full_name)}</b><div style="font-size:12.5px;color:var(--faint)">${esc(me.specialty)}</div><button class="btn dng" id="btnOut" style="margin-top:10px;font-size:12.5px;padding:7px 13px">Sign out</button></div>`;
      document.getElementById('btnOut').addEventListener('click',()=>sb.auth.signOut().then(()=>location.reload()));
      go('inbox');loadAll();
    });
  });
}

/* ── NAV ── */
var HDRS={inbox:['Inbox',()=>'Requests that need your decision'+(isAdmin?' — all doctors':'')],day:['Calendar',()=>'Your appointments — day and week views'],blocks:['Block time',()=>'Hide slots from patients for surgery or other duties'],timings:['My timings',()=>'Weekly consulting sessions — patients see 30-minute slots inside these windows'],roster:['Hospital roster',()=>'Every doctor\'s pending and confirmed visits for the selected day'],acct:['Account',()=>'Password and session']};
function go(p){
  document.querySelectorAll('.rib').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
  $('p-'+p).classList.add('on');
  var h=HDRS[p]||['',''];$('tTitle').textContent=h[0];$('tSub').textContent=h[1]();
}
document.querySelectorAll('.rib').forEach(b=>b.addEventListener('click',()=>{go(b.dataset.p);if(b.dataset.p==='day')renderCalendar();}));

/* ─── CALENDAR (Phase 2) ─── */
var calView='day', calAnchor=new Date();
calAnchor.setHours(0,0,0,0);

var DAYS_S=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS_C=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// OP hours: 10-14, 18-21  (slots each 60px per hour, 24px break gap)
// Pixel layout: gutter rows for 10,10:30,11,11:30,12,12:30,13,13:30 = 8×30px = 480px
// then break 24px, then 18,18:30,19,19:30,20,20:30 = 6×30px = 360px
// We use 60px per hour so each 30min = 30px
var HOUR_H=60, BREAK_H=24;
var MORNING_START=10, MORNING_END=14;  // 10:00–14:00
var EVE_START=18, EVE_END=21;          // 18:00–21:00

var CAL_HDR=42;
function calTimeToY(dtStr){
  var d=new Date(dtStr), h=d.getHours(), m=d.getMinutes();
  var morningPx=(MORNING_END-MORNING_START)*HOUR_H;
  if(h>=MORNING_START && h<MORNING_END) return CAL_HDR+(h-MORNING_START)*HOUR_H+m/60*HOUR_H;
  if(h>=EVE_START && h<EVE_END) return CAL_HDR+morningPx+BREAK_H+(h-EVE_START)*HOUR_H+m/60*HOUR_H;
  return -1;
}
function calTotalH(){ return CAL_HDR+(MORNING_END-MORNING_START)*HOUR_H+BREAK_H+(EVE_END-EVE_START)*HOUR_H; }

function buildGutter(){
  var g=document.getElementById('calGutter');
  g.innerHTML='';
  var HDR=42, totalH=HDR+(MORNING_END-MORNING_START)*HOUR_H+BREAK_H+(EVE_END-EVE_START)*HOUR_H;
  g.style.cssText='position:relative;min-height:'+totalH+'px';
  // header spacer
  var sp=document.createElement('div'); sp.style.height=HDR+'px'; g.appendChild(sp);
  var top=HDR;
  for(var hr=MORNING_START;hr<MORNING_END;hr++){
    var lbl=document.createElement('div');
    lbl.className='cal-gutter-lbl';
    lbl.style.top=(top)+'px';
    lbl.textContent=hr+':00';
    g.appendChild(lbl);
    top+=HOUR_H;
  }
  var brk=document.createElement('div');
  brk.className='cal-gutter-break';
  brk.style.cssText='position:absolute;top:'+top+'px;left:0;right:0;height:'+BREAK_H+'px';
  brk.textContent='break';
  g.appendChild(brk);
  top+=BREAK_H;
  for(var hr=EVE_START;hr<EVE_END;hr++){
    var lbl=document.createElement('div');
    lbl.className='cal-gutter-lbl';
    lbl.style.top=(top)+'px';
    lbl.textContent=hr+':00';
    g.appendChild(lbl);
    top+=HOUR_H;
  }
}

function buildDayCol(date, appts, blocks){
  var col=document.createElement('div');
  var isToday=date.toDateString()===new Date().toDateString();
  col.className='cal-col'+(isToday?' cal-col-today':'');
  col.style.cssText='position:relative;min-height:'+calTotalH()+'px';

  // header
  var hdr=document.createElement('div');
  hdr.className='cal-day-hdr';
  hdr.innerHTML='<div class="cal-dnum'+(isToday?' today':'')+'">'+date.getDate()+'</div>'
    +'<div class="cal-dname">'+DAYS_S[date.getDay()]+'</div>';
  col.appendChild(hdr);

  // grid lines (positioned from top of col, after header)
  var y=0;
  for(var hr=MORNING_START;hr<MORNING_END;hr++){
    var row=document.createElement('div'); row.className='cal-hour-row';
    row.style.cssText='position:absolute;left:0;right:0;top:'+(CAL_HDR+y)+'px;height:'+HOUR_H+'px';
    var half=document.createElement('div'); half.className='cal-half-mark'; row.appendChild(half);
    col.appendChild(row); y+=HOUR_H;
  }
  var brk=document.createElement('div'); brk.className='cal-break-row';
  brk.style.cssText='position:absolute;left:0;right:0;top:'+(CAL_HDR+y)+'px;height:'+BREAK_H+'px';
  col.appendChild(brk); y+=BREAK_H;
  for(var hr=EVE_START;hr<EVE_END;hr++){
    var row=document.createElement('div'); row.className='cal-hour-row';
    row.style.cssText='position:absolute;left:0;right:0;top:'+(CAL_HDR+y)+'px;height:'+HOUR_H+'px';
    var half=document.createElement('div'); half.className='cal-half-mark'; row.appendChild(half);
    col.appendChild(row); y+=HOUR_H;
  }

  // now line
  if(isToday){
    var nowY=calTimeToY(new Date().toISOString());
    if(nowY>0){
      var nl=document.createElement('div'); nl.className='cal-now';
      nl.style.top=nowY+'px'; col.appendChild(nl);
    }
  }

  // appointment chips
  appts.forEach(function(a){
    var topY=calTimeToY(a.slot_start), botY=calTimeToY(a.slot_end);
    if(topY<0) return;
    var h=Math.max(28,botY-topY);
    var chip=document.createElement('div');
    chip.className='cal-appt '+a.status;
    chip.style.cssText='top:'+topY+'px;height:'+h+'px';
    var t=new Date(a.slot_start).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true});
    chip.innerHTML='<div class="an">'+esc(a.patient_name)+'</div>'
      +'<div class="at">'+t+'</div>'
      +(h>44?'<span class="ast">'+a.status+'</span>':'');
    chip.addEventListener('click',function(e){e.stopPropagation();showCalPopover(a,e);});
    col.appendChild(chip);
  });

  // block spans
  (blocks||[]).forEach(function(b){
    var iso=date.toISOString().slice(0,10);
    var from=new Date(iso+'T'+b.from_time), to=new Date(iso+'T'+b.to_time);
    var topY=calTimeToY(from.toISOString()), botY=calTimeToY(to.toISOString());
    if(topY<0) return;
    var chip=document.createElement('div');
    chip.className='cal-appt blocked';
    chip.style.cssText='top:'+topY+'px;height:'+Math.max(28,botY-topY)+'px';
    chip.innerHTML='<div class="an" style="font-size:10.5px;padding-left:6px">🔒 '+esc(b.category||'Blocked')+'</div>';
    col.appendChild(chip);
  });

  return col;
}

window.setCalView=function(v){calView=v;document.getElementById('cvDay').classList.toggle('on',v==='day');document.getElementById('cvWeek').classList.toggle('on',v==='week');renderCalendar();};
window.calNav=function(dir){
  var d=new Date(calAnchor);
  if(calView==='day') d.setDate(d.getDate()+dir);
  else d.setDate(d.getDate()+dir*7);
  calAnchor=d; renderCalendar();
};
window.calGoToday=function(){calAnchor=new Date();calAnchor.setHours(0,0,0,0);renderCalendar();};

function renderCalendar(){
  if(!me) return;
  // populate doc pill
  var pill=document.getElementById('calDocLabel');
  if(pill){pill.style.display='flex';document.getElementById('calDocAv').textContent=ini(me.full_name);document.getElementById('calDocName').textContent=me.full_name;}
  buildGutter();
  var cols=document.getElementById('calCols');
  cols.innerHTML='';
  var dates=[];
  if(calView==='day'){
    dates=[new Date(calAnchor)];
    document.getElementById('calRangeLabel').textContent=calAnchor.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  } else {
    // Mon–Sat week
    var mon=new Date(calAnchor);
    var dow=mon.getDay(); if(dow===0) dow=7;
    mon.setDate(mon.getDate()-(dow-1));
    for(var i=0;i<6;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);dates.push(x);}
    document.getElementById('calRangeLabel').textContent=
      dates[0].getDate()+' '+MONTHS_C[dates[0].getMonth()]+' – '+dates[5].getDate()+' '+MONTHS_C[dates[5].getMonth()]+' '+dates[5].getFullYear();
  }

  // fetch appointments for date range
  var from=dates[0].toISOString().slice(0,10)+'T00:00:00';
  var to=dates[dates.length-1].toISOString().slice(0,10)+'T23:59:59';
  var q=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id').gte('slot_start',from).lte('slot_start',to).in('status',['pending','confirmed','rescheduled']).order('slot_start');
  if(!isAdmin) q=q.eq('doctor_id',me.id);

  var bq=sb.from('slot_blocks').select('from_time,to_time,block_date,category,note').gte('block_date',dates[0].toISOString().slice(0,10)).lte('block_date',dates[dates.length-1].toISOString().slice(0,10));
  if(!isAdmin) bq=bq.eq('doctor_id',me.id);

  Promise.all([q,bq]).then(function(results){
    var appts=results[0].data||[], blocks=results[1].data||[];
    dates.forEach(function(d){
      var iso=d.toISOString().slice(0,10);
      var dayAppts=appts.filter(function(a){return a.slot_start.slice(0,10)===iso});
      var dayBlocks=blocks.filter(function(b){return b.block_date===iso});
      cols.appendChild(buildDayCol(d,dayAppts,dayBlocks));
    });
    cols.style.minHeight=calTotalH()+'px';
  });
}

function showCalPopover(a, e){
  var pop=document.getElementById('calPopover');
  var t=new Date(a.slot_start).toLocaleString('en-IN',{weekday:'short',day:'numeric',month:'short',hour:'numeric',minute:'2-digit',hour12:true});
  document.getElementById('cpName').textContent=a.patient_name;
  document.getElementById('cpSpec').textContent=a.status.toUpperCase().replace(/_/g,' ')+' · REF: '+(a.booking_ref||'—');
  document.getElementById('cpTime').innerHTML='<strong>'+t+'</strong>';
  document.getElementById('cpPhone').innerHTML='<a href="tel:+91'+a.patient_phone+'" style="color:var(--pea);font-weight:700;text-decoration:none">+91 '+a.patient_phone+'</a>';
  var reasonRow=document.getElementById('cpReasonRow');
  if(a.reason){reasonRow.style.display='flex';document.getElementById('cpReason').textContent=a.reason;}else{reasonRow.style.display='none';}
  var acts='';
  if(a.status==='pending') acts='<button class="cal-pop-btn cal-pop-confirm" onclick="calConfirm(\''+a.id+'\')">✓ Confirm</button><button class="cal-pop-btn cal-pop-cancel" onclick="calDecline(\''+a.id+'\')">Decline</button>';
  if(a.status==='confirmed') acts='<button class="cal-pop-btn cal-pop-cancel" onclick="calDecline(\''+a.id+'\')">Cancel appointment</button>';
  document.getElementById('cpActions').innerHTML=acts;
  var rect=e.target.closest('.cal-appt').getBoundingClientRect();
  pop.style.display='block';
  pop.style.position='fixed';
  var left=Math.min(rect.right+10, window.innerWidth-320);
  var top=Math.min(rect.top, window.innerHeight-320);
  pop.style.top=Math.max(60,top)+'px';
  pop.style.left=Math.max(80,left)+'px';
}
window.calConfirm=function(id){
  sb.from('appointments').update({status:'confirmed'}).eq('id',id).then(()=>{document.getElementById('calPopover').style.display='none';renderCalendar();loadInbox();});
};
window.calDecline=function(id){
  if(!confirm('Cancel this appointment?')) return;
  sb.from('appointments').update({status:'cancelled_by_doctor'}).eq('id',id).then(()=>{document.getElementById('calPopover').style.display='none';renderCalendar();loadInbox();});
};
document.addEventListener('click',function(e){var pop=document.getElementById('calPopover');if(pop&&!pop.contains(e.target)&&!e.target.closest('.cal-appt'))pop.style.display='none';});

/* ── INBOX ── */
var cache={pending:[],upcoming:[],past:[]};
function loadAll(){loadInbox();loadDay();loadBlocks();loadTimings();if(isAdmin)loadRoster();}

function loadInbox(){
  var now=new Date().toISOString(),p30=new Date(Date.now()-30*864e5).toISOString();
  var q1=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id,doctors!appointments_doctor_id_fkey(full_name)').eq('status','pending').order('slot_start');
  var q2=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id,doctors!appointments_doctor_id_fkey(full_name)').eq('status','confirmed').gte('slot_start',now).order('slot_start');
  var q3=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id,doctors!appointments_doctor_id_fkey(full_name)').in('status',['completed','rejected','cancelled_by_doctor','cancelled_by_patient','rescheduled','no_show']).gte('slot_start',p30).order('slot_start',{ascending:false}).limit(40);
  if(!isAdmin){q1=q1.eq('doctor_id',me.id);q2=q2.eq('doctor_id',me.id);q3=q3.eq('doctor_id',me.id);}
  Promise.all([q1,q2,q3]).then(([r1,r2,r3])=>{
    cache.pending=r1.data||[];cache.upcoming=r2.data||[];cache.past=r3.data||[];
    var n=cache.pending.length;
    $('ribBadge').style.display=n?'grid':'none';$('ribBadge').textContent=n;
    var todayC=cache.upcoming.filter(a=>dkey(a.slot_start)===todayK()).length;
    var weekC=cache.upcoming.filter(a=>new Date(a.slot_start)-Date.now()<7*864e5).length;
    $('bands').innerHTML=
      band('b1',n,'Awaiting decision','M12 8v4l2 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0')+
      band('b2',todayC,'Confirmed today','M5 13l4 4L19 7')+
      band('b3',weekC,'Confirmed this week','M8 3v4M16 3v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2')+
      band('b4',cache.past.length,'Past 30 days','M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2');
    renderInbox();
  });
}
function band(cls,n,label,path){return`<div class="band ${cls}"><div class="ic"><svg viewBox="0 0 24 24"><path d="${path}"/></svg></div><b>${n}</b><span>${label}</span></div>`;}

$('srch').addEventListener('input',renderInbox);
function match(a,t){if(!t)return true;t=t.toLowerCase();return(a.patient_name||'').toLowerCase().includes(t)||(a.patient_phone||'').includes(t)||(a.booking_ref||'').toLowerCase().includes(t);}

function renderInbox(){
  var t=$('srch').value.trim(),box=$('inboxBody');
  /* pending section */
  var pend=cache.pending.filter(a=>match(a,t));
  /* upcoming section */
  var upc=cache.upcoming.filter(a=>match(a,t));
  /* past section */
  var pst=cache.past.filter(a=>match(a,t));
  var html='';
  if(!pend.length&&!upc.length&&!pst.length){box.innerHTML=`<div class="empty">${EMPTY_ECG}<p>All caught up — nothing needs your attention.</p></div>`;return;}
  if(pend.length){
    html+=`<div class="sl">Needs your decision <span style="background:var(--mari-s);color:var(--mari);font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:99px">${pend.length}</span></div><div class="aplist">`+pend.map((a,i)=>aCard(a,'pending',i)).join('')+'</div>';
  }
  if(upc.length){
    html+=`<div class="sl" style="margin-top:24px">Upcoming confirmed</div><div class="aplist">`+upc.map((a,i)=>aCard(a,'upcoming',i)).join('')+'</div>';
  }
  if(pst.length&&t){
    html+=`<div class="sl" style="margin-top:24px">Past 30 days</div><div class="aplist">`+pst.map((a,i)=>aCard(a,'past',i)).join('')+'</div>';
  }
  box.innerHTML=html;
}

function aCard(a,mode,idx){
  var c=pal(a.patient_name),delay=(idx*0.04)+'s';
  var doc=isAdmin?(a.doctors&&a.doctors.full_name)||'—':null;
  var acts='';
  if(mode==='pending'){
    acts=`<button class="ab ok" onclick="setStatus('${a.id}','confirmed')"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> Confirm appointment</button>`+
    `<button class="ab no" onclick="askReject(this,'${a.id}','rejected')"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg> Decline</button>`+
    `<button class="ab gh" onclick="openResched('${a.id}')" style="margin-left:auto">Reschedule</button>`;
  }else if(mode==='upcoming'){
    acts=`<button class="ab gh" onclick="openResched('${a.id}')">Reschedule</button>`+
    `<button class="ab no" onclick="askReject(this,'${a.id}','cancelled_by_doctor')">Cancel visit</button>`;
  }
  return`<div class="apc" style="animation-delay:${delay}">
    <div class="top">
      <div class="ava2" style="background:${c[0]};color:${c[1]}">${ini(a.patient_name)}</div>
      <div class="meta">
        <div class="name">${esc(a.patient_name)}<span class="ref">${a.booking_ref}</span>${doc?`<span style="font-size:11px;color:var(--faint);font-weight:700">${esc(doc)}</span>`:''}</div>
        <div class="detail">${a.reason?esc(a.reason)+' · ':''}<a href="tel:+91${esc(a.patient_phone)}" style="color:var(--pea);font-weight:700">${esc(a.patient_phone)}</a></div>
      </div>
      <span class="pill ${a.status}">${a.status.replace(/_/g,' ')}</span>
    </div>
    <div class="slotbar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--pea)" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span class="stime">${fD(a.slot_start)} · ${fT(a.slot_start)}</span>
      <span class="sdoc">30 min consultation</span>
    </div>
    ${acts?`<div class="acts">${acts}</div>`:''}
  </div>`;
}

window.setStatus=function(id,st){
  sb.from('appointments').update({status:st}).eq('id',id).then(r=>{
    if(r.error){toast('Update failed — please try again');return;}
    var msgs={confirmed:'Confirmed ✓ — desk will call the patient',rejected:'Declined',cancelled_by_doctor:'Visit cancelled'};
    toast(msgs[st]||'Updated');loadInbox();loadDay();if(isAdmin)loadRoster();
  });
};
window.askReject=function(btn,id,st){
  var label=st==='rejected'?'Decline this request?':'Cancel this confirmed visit?';
  btn.closest('.acts').innerHTML=`<div class="cfm"><span>${label}</span><button class="ab yes" onclick="setStatus('${id}','${st}')">Yes, confirm</button><button class="ab gh" onclick="loadInbox()">Keep it</button></div>`;
};

/* ── RESCHEDULE ── */
window.openResched=function(id){
  sb.from('appointments').select('*').eq('id',id).single().then(r=>{
    if(r.error)return toast('Could not load');
    var a=r.data,chosen=null;
    $('mc').innerHTML=`<h2>Reschedule</h2><div style="font-size:13.5px;color:var(--muted);margin-bottom:14px">${esc(a.patient_name)} · ${fD(a.slot_start)} ${fT(a.slot_start)}</div><label class="fl">Pick a new date</label><input class="fi" type="date" id="rsDate" min="${todayK()}"><div id="rsSlots" style="margin-top:12px;font-size:13px;color:var(--faint)">Choose a date to see available slots.</div><div class="mact"><button class="btn" onclick="closeModal()">Close</button><button class="btn pri" id="rsGo" disabled>Move appointment</button></div>`;
    $('modal').classList.add('open');
    $('rsDate').addEventListener('change',()=>{
      sb.rpc('get_available_slots',{p_doctor:a.doctor_id,p_day:$('rsDate').value}).then(res=>{
        var sl=res.data||[];
        $('rsSlots').innerHTML=sl.length?`<div class="sl" style="margin:8px 0">Available slots</div><div class="mslots">${sl.map(s=>`<span class="ms" data-s="${s.slot_start}" data-e="${s.slot_end}">${fT(s.slot_start)}</span>`).join('')}</div>`:'No slots available this day.';
        document.querySelectorAll('.ms').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.ms').forEach(x=>x.classList.remove('on'));c.classList.add('on');chosen={s:c.dataset.s,e:c.dataset.e};$('rsGo').disabled=false;}));
      });
    });
    $('rsGo').addEventListener('click',()=>{
      if(!chosen)return;
      sb.from('appointments').insert({doctor_id:a.doctor_id,patient_name:a.patient_name,patient_phone:a.patient_phone,patient_email:a.patient_email,patient_age:a.patient_age,patient_gender:a.patient_gender,reason:a.reason,slot_start:chosen.s,slot_end:chosen.e,status:'confirmed',rescheduled_from:a.id}).then(ins=>{
        if(ins.error)return toast('Slot may have been taken — pick another');
        sb.from('appointments').update({status:'rescheduled'}).eq('id',a.id).then(()=>{closeModal();toast('Rescheduled — desk should call the patient');loadInbox();loadDay();if(isAdmin)loadRoster();});
      });
    });
  });
};
window.closeModal=function(){$('modal').classList.remove('open')};
document.querySelector('#modal .mbg').addEventListener('click',closeModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* ── MY DAY — now handled by calendar; stub kept for loadAll() compatibility ── */
function loadDay(){ if(typeof renderCalendar==='function' && me) renderCalendar(); }

/* ── BLOCKS ── */
$('bSave').addEventListener('click',()=>{
  var d=$('bDate').value,f=$('bFrom').value,t=$('bTo').value;
  if(!d||!f||!t||f>=t)return toast('Check date and time range');
  sb.from('slot_blocks').insert({doctor_id:me.id,start_at:new Date(d+'T'+f+':00+05:30').toISOString(),end_at:new Date(d+'T'+t+':00+05:30').toISOString(),category:$('bCat').value,note:$('bNote').value||null}).then(r=>{
    if(r.error)return toast('Could not save block');
    toast('Time blocked — hidden from patients');$('bNote').value='';loadBlocks();loadDay();
  });
});
function loadBlocks(){
  sb.from('slot_blocks').select('*').eq('doctor_id',me.id).gte('end_at',new Date().toISOString()).order('start_at').then(r=>{
    var rows=r.data||[],box=$('blockBody');
    if(!rows.length){box.innerHTML=`<div class="empty">${EMPTY_ECG}<p>No upcoming blocks.</p></div>`;return;}
    box.innerHTML='<div class="aplist">'+rows.map(b=>`<div class="apc"><div class="top"><div class="ava2" style="background:var(--lav-s);color:var(--lav);font-size:18px">⏸</div><div class="meta"><div class="name" style="text-transform:capitalize">${b.category}</div><div class="detail">${fD(b.start_at)} · ${fT(b.start_at)} – ${fT(b.end_at)}${b.note?' · '+esc(b.note):''}</div></div></div><div class="acts"><button class="ab no" onclick="delBlock('${b.id}')">Remove block</button></div></div>`).join('')+'</div>';
  });
}
window.delBlock=id=>sb.from('slot_blocks').delete().eq('id',id).then(()=>{toast('Block removed');loadBlocks();loadDay();});

/* ── TIMINGS ── */
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function loadTimings(){
  sb.from('doctor_schedules').select('*').eq('doctor_id',me.id).order('weekday').order('start_time').then(r=>{
    var rows=r.data||[],by={};rows.forEach(s=>(by[s.weekday]=by[s.weekday]||[]).push(s));
    $('timBody').innerHTML=[1,2,3,4,5,6,0].map(w=>{
      var sess=(by[w]||[]).map(s=>`<span class="sess">${s.start_time.slice(0,5)}–${s.end_time.slice(0,5)}<button onclick="delSess('${s.id}')">✕</button></span>`).join(' ');
      return`<div class="timrow"><b>${DAYS[w]}</b>${sess||`<span style="font-size:13px;color:var(--faint)">No sessions — patients can't book</span>`}<button class="btn tadd" onclick="addSess(${w})">+ Add</button></div>`;
    }).join('');
  });
}
window.delSess=id=>sb.from('doctor_schedules').delete().eq('id',id).then(()=>{toast('Session removed');loadTimings();});
window.addSess=function(w){
  $('mc').innerHTML=`<h2>Add session · ${DAYS[w]}</h2><div class="gform"><div><label class="fl">From</label><input class="fi" type="time" id="tsF" value="10:00"></div><div><label class="fl">To</label><input class="fi" type="time" id="tsT" value="14:00"></div></div><div class="mact"><button class="btn" onclick="closeModal()">Close</button><button class="btn pri" id="tsGo">Add session</button></div>`;
  $('modal').classList.add('open');
  $('tsGo').addEventListener('click',()=>{
    var f=$('tsF').value,t=$('tsT').value;
    if(!f||!t||f>=t)return toast('End must be after start');
    sb.from('doctor_schedules').insert({doctor_id:me.id,weekday:w,start_time:f,end_time:t,slot_minutes:30}).then(r=>{
      if(r.error)return toast('Could not add');closeModal();toast('Session added — slots live now');loadTimings();
    });
  });
};

/* ── ROSTER ── */
$('roDate').addEventListener('change',loadRoster);
$('roToday').addEventListener('click',()=>{$('roDate').value=todayK();loadRoster();});
function loadRoster(){
  var day=$('roDate').value;if(!day)return;
  var from=new Date(day+'T00:00:00+05:30').toISOString(),to=new Date(day+'T23:59:59+05:30').toISOString();
  Promise.all([
    sb.from('appointments').select('doctor_id,status').gte('slot_start',from).lte('slot_start',to).in('status',['pending','confirmed']),
    sb.from('slot_blocks').select('doctor_id,category').lte('start_at',to).gte('end_at',from)
  ]).then(([r1,r2])=>{
    var ap=r1.data||[],bl=r2.data||[],tot={p:0,c:0};
    $('rosterBody').innerHTML=allDocs.sort((a,b)=>a.full_name.localeCompare(b.full_name)).map((d,i)=>{
      var mine=ap.filter(a=>a.doctor_id===d.id);
      var p=mine.filter(a=>a.status==='pending').length,c=mine.filter(a=>a.status==='confirmed').length;
      tot.p+=p;tot.c+=c;
      var bls=bl.filter(b=>b.doctor_id===d.id),col=pal(d.full_name);
      return`<div class="rcard" style="animation-delay:${i*0.015}s"><div style="display:flex;gap:10px;align-items:center;margin-bottom:8px"><div class="ava2" style="background:${col[0]};color:${col[1]};width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:800;flex:none">${ini(d.full_name)}</div><div style="min-width:0"><div class="rn">${esc(d.full_name)}</div><div class="rs">${esc(d.specialty)}</div></div></div><div class="rr"><span>Pending</span><span class="tchip y">${p}</span></div><div class="rr"><span>Confirmed</span><span class="tchip g">${c}</span></div><div class="rr"><span>Blocks</span><span class="tchip ${bls.length?'r':'g'}">${bls.length?bls.map(b=>b.category).join(', '):'none'}</span></div></div>`;
    }).join('');
    $('roSum').textContent=`${tot.p} pending · ${tot.c} confirmed hospital-wide`;
  });
}

/* ── ACCOUNT ── */
$('npBtn').addEventListener('click',()=>{
  var a=$('np1').value,b=$('np2').value;
  if(a.length<8)return toast('Password must be 8+ characters');
  if(a!==b)return toast('Passwords don\'t match');
  sb.auth.updateUser({password:a}).then(r=>{if(r.error)return toast('Could not update');$('np1').value='';$('np2').value='';toast('Password updated');});
});
})();
</script>
