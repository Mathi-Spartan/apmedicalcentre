<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Doctor Portal · A P Medical Center</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EDF3FB;--card:#FFFFFF;--card2:#F4F8FE;--tint:#F4F8FE;
  --blue:#3E7BFA;--blue-deep:#2B5FD9;--blue-soft:#E3EDFF;--blue-s:#E3EDFF;
  --ink:#16294E;--navy:#16294E;--muted:#7C8DB0;--faint:#AAB8D4;--line:#E4ECF8;
  --green:#1FA97C;--green-s:#E2F7EF;
  --amber:#D98E1B;--amber-s:#FDF1DC;
  --rose:#E04E6B;--rose-s:#FDE7EC;
  --lav:#8E7BF2;--lav-s:#EEEAFE;
  --slate:#8FA3C0;--slate-s:#EBF1F8;
  --r:20px;
  --shadow:0 6px 24px rgba(43,95,217,.07),0 1px 3px rgba(22,41,78,.05);
  /* legacy aliases kept so ported markup keeps working */
  --LP-bg:#EDF3FB;--LP-card:#FFFFFF;--LP-card2:#F4F8FE;
  --LP-ink:#16294E;--LP-muted:#7C8DB0;--LP-faint:#AAB8D4;
  --LP-line:#E4ECF8;--LP-navy:#16294E;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Figtree',sans-serif;font-size:15px;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
svg{display:block;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
button{font-family:'Figtree';cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'Figtree';outline:none}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ── LOGIN ── */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#EDF3FB 0%,#DCE9FB 55%,#CFE0FA 100%);padding:20px}
.lbox{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:44px 40px;width:100%;max-width:390px;box-shadow:0 24px 60px rgba(43,95,217,.16)}
.lmark{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#4A82FF,#2B5FD9);display:grid;place-items:center;margin:0 auto 22px;font-family:'Instrument Serif',serif;font-size:24px;color:#fff;box-shadow:0 10px 24px rgba(62,123,250,.35)}
.lbox h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;color:var(--ink);text-align:center;margin-bottom:4px}
.lbox h1 em{font-style:italic;color:var(--blue)}
.lsub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:28px}
.llbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;margin-top:16px}
.lfi{width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:14px;font-size:14px;color:var(--ink);background:var(--card2);transition:border-color .18s,background .18s}
.lfi:focus{border-color:var(--blue);background:#fff}
.lerr{font-size:13px;color:var(--rose);background:var(--rose-s);border-radius:10px;padding:9px 13px;margin-top:12px;display:none}
.lbtn{width:100%;margin-top:22px;padding:14px;background:var(--blue);color:#fff;border-radius:999px;font-size:15px;font-weight:800;transition:all .18s;box-shadow:0 8px 20px rgba(62,123,250,.35)}
.lbtn:hover{background:var(--blue-deep)}
.lbtn:disabled{opacity:.5}

/* ── APP SHELL ── */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100%}

/* ── RAIL ── */
.rail{width:74px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:18px 0 16px;gap:6px;flex-shrink:0;z-index:30}
.rmark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#4A82FF,#2B5FD9);display:grid;place-items:center;margin-bottom:16px;font-family:'Instrument Serif',serif;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 6px 14px rgba(62,123,250,.32)}
.rib{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:all .18s;position:relative;flex-shrink:0;background:transparent}
.rib svg{width:19px;height:19px}
.rib:hover{background:var(--blue-soft);color:var(--blue-deep)}
.rib.on{background:var(--blue);color:#fff;box-shadow:0 6px 14px rgba(62,123,250,.35)}
.badge{position:absolute;top:5px;right:5px;min-width:15px;height:15px;border-radius:99px;background:var(--rose);color:#fff;font-size:8.5px;font-weight:800;display:none;place-items:center;padding:0 3px;border:2px solid var(--card)}
.rib.on .badge{border-color:var(--blue)}
.rsep{width:26px;height:1px;background:var(--line);margin:5px 0}
.rib.sp{margin-top:auto}
#ava{width:40px;height:40px;border-radius:50%;border:2px solid var(--line);font-size:11px;font-weight:800;cursor:pointer;color:var(--muted);background:var(--card2);transition:.18s}
#ava:hover{border-color:var(--blue)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{padding:20px 28px 0;display:flex;align-items:flex-start;gap:14px;flex-shrink:0}
.topbar h2{font-family:'Instrument Serif',serif;font-weight:400;font-size:27px;color:var(--ink);letter-spacing:-.01em;line-height:1.1}
.tsub{font-size:13px;color:var(--muted);margin-top:3px}
.topbar>div:first-child{flex:1}
.pg{flex:1;overflow-y:auto;padding:18px 28px 44px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.pane{display:none;animation:fadeUp .3s cubic-bezier(.3,.7,.2,1)}
.pane.on{display:flex;flex-direction:column;min-height:0;flex:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:1fr 330px;gap:20px;align-items:start}

/* Stat strip */
.ds-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.ds-c{background:var(--card);border-radius:var(--r);padding:17px 18px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow)}
.ds-ico{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;flex-shrink:0}
.ds-n{font-size:23px;font-weight:800;line-height:1;color:var(--ink)}
.ds-k{font-size:11px;font-weight:700;color:var(--muted);margin-top:3px;letter-spacing:.02em}

/* Hero — next appointment */
.hero{background:linear-gradient(135deg,#4A82FF 0%,#2B5FD9 100%);border-radius:24px;padding:24px 26px;color:#fff;box-shadow:0 14px 32px rgba(43,95,217,.32);position:relative;overflow:hidden;margin-bottom:20px}
.hero::after{content:'';position:absolute;right:-60px;top:-60px;width:210px;height:210px;border-radius:50%;background:rgba(255,255,255,.09)}
.hero::before{content:'';position:absolute;right:34px;bottom:-80px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.18);padding:5px 12px;border-radius:999px;margin-bottom:13px}
.hero .who{display:flex;align-items:center;gap:13px}
.hero .pav{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;font-weight:800;font-size:16px;flex-shrink:0}
.hero .who b{font-size:18px;display:block}
.hero .who span{font-size:12.5px;opacity:.85}
.hero .meta{display:flex;gap:20px;margin:16px 0 18px;font-size:13px;flex-wrap:wrap;position:relative;z-index:1}
.hero .meta div{display:flex;align-items:center;gap:7px;opacity:.95}
.hero .meta svg{width:15px;height:15px}
.hero .cta{display:flex;gap:10px;position:relative;z-index:1}
.hbtn{border-radius:999px;padding:10px 20px;font-weight:700;font-size:13px;display:inline-flex;align-items:center}
.hbtn.w{background:#fff;color:var(--blue-deep)}
.hbtn.g{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35)}
.hero.calm{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.hero.calm::before,.hero.calm::after{display:none}
.hero.calm .tag{background:var(--blue-soft);color:var(--blue-deep)}
.hero.calm p{font-size:13.5px;color:var(--muted)}

/* Pending card */
.pending-wrap{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.pending-hdr{display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid var(--line)}
.pending-hdr span{font-size:14.5px;font-weight:800;color:var(--ink)}
.pbadge{font-size:10px;font-weight:800;background:var(--amber-s);color:var(--amber);padding:2px 8px;border-radius:99px;display:none}
.view-all{margin-left:auto;font-size:12.5px;color:var(--blue-deep);font-weight:700;cursor:pointer;border:none;background:none;padding:0}
.dprow{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);animation:fadeUp .3s both}
.dprow:last-child{border-bottom:none}
.dpav{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0}
.dpmeta{flex:1;min-width:0}
.dpname{font-size:13.5px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dpdoc{font-size:10px;font-weight:700;color:var(--blue-deep);background:var(--blue-soft);padding:2px 7px;border-radius:99px}
.dptime{font-size:12px;color:var(--muted);margin-top:2px}
.dpacts{display:flex;gap:7px;flex-shrink:0;align-items:center}
.dpok{padding:8px 16px;border-radius:999px;font-size:12px;font-weight:800;background:var(--blue);color:#fff;transition:all .18s;box-shadow:0 4px 10px rgba(62,123,250,.25)}
.dpok:hover{background:var(--blue-deep)}
.dpno{padding:8px 16px;border-radius:999px;font-size:12px;font-weight:800;background:var(--rose-s);color:var(--rose);transition:all .18s}
.dpno:hover{background:var(--rose);color:#fff}

/* Right column */
.side .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.side .card .ch{font-size:14px;font-weight:800;color:var(--ink);padding:15px 18px 0}
.mini-cal-wrap{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:13px 16px 16px}
.qbtn{background:var(--tint);border:1px solid var(--line);border-radius:15px;padding:12px 13px;cursor:pointer;text-align:left;transition:all .18s}
.qbtn:hover{background:var(--blue-soft);border-color:rgba(62,123,250,.35)}
.qbtn .qt{font-size:12.5px;font-weight:800;color:var(--ink)}
.qbtn .qs{font-size:11px;color:var(--muted);margin-top:2px}
.durow{display:flex;align-items:center;gap:9px;padding:9px 18px;border-bottom:1px solid var(--line)}
.durow:last-child{border-bottom:none}
.dudot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.duname{font-size:12.5px;font-weight:700;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dutime{font-size:11.5px;color:var(--muted);flex-shrink:0}
#dUpcoming{padding-bottom:6px;margin-top:8px}

/* ── INBOX & LISTS ── */
.bandstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.band{background:var(--card);border-radius:var(--r);padding:16px 17px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.band .ic{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;flex-shrink:0}
.band .ic svg{width:17px;height:17px}
.band b{font-size:22px;font-weight:800;color:var(--ink);line-height:1;display:block}
.band span{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.03em;display:block;margin-top:3px}
.band.b1 .ic{background:var(--amber-s);color:var(--amber)}
.band.b2 .ic{background:var(--green-s);color:var(--green)}
.band.b3 .ic{background:var(--blue-soft);color:var(--blue-deep)}
.band.b4 .ic{background:var(--slate-s);color:var(--slate)}
.srow{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.sbox{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:11px 18px;flex:1;transition:border-color .18s;box-shadow:var(--shadow)}
.sbox:focus-within{border-color:var(--blue)}
.sbox svg{width:15px;height:15px;color:var(--faint);flex-shrink:0}
.sbox input{flex:1;border:none;font-size:14px;color:var(--ink);background:transparent}
.sbox input::placeholder{color:var(--faint)}
.sl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sl span{background:var(--amber-s);color:var(--amber);padding:2px 8px;border-radius:99px;font-size:10px}
.aplist{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.empty{padding:44px 0;text-align:center;color:var(--muted);font-size:14px}
.apc{background:var(--card);border-radius:var(--r);overflow:hidden;animation:fadeUp .3s both;box-shadow:var(--shadow)}
.apc .top{display:flex;gap:12px;align-items:flex-start;padding:15px 17px}
.ava2{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0}
.meta{flex:1;min-width:0}
.name{font-size:14px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ref{font-size:10px;font-weight:700;color:var(--muted);background:var(--slate-s);padding:2px 8px;border-radius:99px}
.detail{font-size:12.5px;color:var(--muted);margin-top:3px}
.pill{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:4px 11px;border-radius:99px;flex-shrink:0}
.pill.pending{background:var(--amber-s);color:var(--amber)}
.pill.confirmed{background:var(--green-s);color:var(--green)}
.pill.rejected,.pill.cancelled_by_doctor,.pill.cancelled_by_patient{background:var(--rose-s);color:var(--rose)}
.pill.rescheduled,.pill.completed,.pill.no_show{background:var(--slate-s);color:var(--slate)}
.slotbar{display:flex;align-items:center;gap:8px;padding:9px 17px;background:var(--tint);border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
.stime{font-weight:700;color:var(--ink)}
.sdoc{color:var(--faint)}
.acts{display:flex;gap:8px;padding:11px 17px;background:var(--card);border-top:1px solid var(--line);flex-wrap:wrap;align-items:center}
.cfm{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ab{padding:8px 16px;border-radius:999px;font-size:12.5px;font-weight:700;transition:all .18s;display:inline-flex;align-items:center;gap:5px;flex-shrink:0}
.ab svg{width:13px;height:13px}
.ab.ok{background:var(--green-s);color:var(--green)}
.ab.ok:hover{background:var(--green);color:#fff}
.ab.no{background:var(--rose-s);color:var(--rose)}
.ab.no:hover{background:var(--rose);color:#fff}
.ab.gh{background:var(--slate-s);color:var(--slate)}
.ab.gh:hover{background:var(--slate);color:#fff}
.ab.yes{background:var(--rose);color:#fff}

/* ── CALENDAR ── */
.cal-wrap{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.cal-tb{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--line);flex-wrap:wrap}
.cal-vtog{display:flex;background:var(--tint);border-radius:999px;padding:3px;gap:2px}
.cvbtn{padding:6px 15px;border-radius:999px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .18s}
.cvbtn.on{background:var(--blue);color:#fff;box-shadow:0 3px 8px rgba(62,123,250,.3)}
.cal-nb{width:29px;height:29px;border-radius:10px;border:1px solid var(--line);background:var(--card);cursor:pointer;display:grid;place-items:center;font-size:15px;color:var(--muted);transition:all .18s;flex-shrink:0}
.cal-nb:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.cal-rl{font-weight:800;font-size:13px;color:var(--ink);min-width:170px;text-align:center;letter-spacing:-.02em}
.cal-tb-today{padding:6px 15px;border-radius:999px;border:1.5px solid var(--blue);color:var(--blue-deep);background:transparent;font-size:12px;font-weight:800;cursor:pointer;transition:all .18s}
.cal-tb-today:hover{background:var(--blue);color:#fff}
.cal-dpill{display:flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border-radius:999px;padding:4px 13px 4px 4px;font-size:11px;font-weight:700;margin-left:auto}
.cal-dpill-av{width:21px;height:21px;border-radius:50%;background:rgba(255,255,255,.25);display:grid;place-items:center;font-size:8px;font-weight:800}
.cal-grid{display:flex;border-top:1px solid var(--line)}
.cal-gt{width:52px;flex-shrink:0;border-right:1px solid var(--line);background:var(--card2);position:relative}
.cal-cs{flex:1;display:flex;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 260px);min-height:400px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.cal-dc{flex:1;min-width:118px;border-right:1px solid var(--line);position:relative}
.cal-dc:last-child{border-right:none}
.cal-dc.is-today{background:rgba(62,123,250,.03)}
.cal-dh{height:38px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:5px;position:sticky;top:0;z-index:5;border-right:1px solid var(--line)}
.cal-dc:last-child .cal-dh{border-right:none}
.cal-dn{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--muted)}
.cal-dn.today{background:var(--blue);color:#fff}
.cal-dnm{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--faint)}
.cal-gt-hdr{height:38px;border-bottom:1px solid var(--line);background:var(--card2)}
.cal-gt-lbl{position:absolute;right:6px;font-size:8.5px;font-weight:700;color:var(--faint);white-space:nowrap;transform:translateY(-50%)}
.cal-gt-brk{position:absolute;right:0;left:0;display:grid;place-items:center;font-size:7px;color:var(--faint);font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--bg)}
.cal-hr{position:absolute;left:0;right:0;border-bottom:1px solid var(--line)}
.cal-hr::after{content:'';position:absolute;left:0;right:0;top:50%;border-top:1px dashed rgba(228,236,248,.9)}
.cal-brk{position:absolute;left:0;right:0;background:repeating-linear-gradient(45deg,var(--bg),var(--bg) 4px,rgba(228,236,248,.7) 4px,rgba(228,236,248,.7) 8px);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.cal-now{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),rgba(62,123,250,.12));z-index:8;pointer-events:none}
.cal-now::before{content:'';position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:var(--blue)}
.cal-chip{position:absolute;left:4px;right:4px;border-radius:10px;padding:4px 7px 4px 10px;cursor:pointer;transition:all .18s;overflow:hidden;border-left:3px solid transparent;box-shadow:0 1px 3px rgba(22,41,78,.08)}
.cal-chip:hover{transform:translateY(-1px) scale(1.02);box-shadow:0 4px 12px rgba(22,41,78,.14);z-index:12}
.cal-chip.confirmed{background:#D9F4EA;border-left-color:var(--green)}
.cal-chip.confirmed .cal-chip-name{color:#0E5C42}
.cal-chip.pending{background:#FCEBC9;border-left-color:var(--amber)}
.cal-chip.pending .cal-chip-name{color:#7A4E10}
.cal-chip.blocked{background:var(--card2);border-left-color:var(--slate);opacity:.75}
.cal-chip-name{font-size:11px;font-weight:800;line-height:1.2;margin-bottom:1px}
.cal-chip-time{font-size:9px;font-weight:600;color:var(--muted)}
.cal-chip-tag{display:inline-block;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:1px 5px;border-radius:5px;margin-top:2px;background:rgba(31,169,124,.14);color:var(--green)}
.cal-chip.pending .cal-chip-tag{background:rgba(217,142,27,.15);color:var(--amber)}
.cal-leg-bar{display:flex;gap:16px;padding:10px 16px;background:var(--card2);border-top:1px solid var(--line);flex-wrap:wrap}
.cal-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600}
.cal-leg-sq{width:10px;height:10px;border-radius:3px}
.cal-month-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line);background:var(--card2);position:sticky;top:0;z-index:4}
.cal-month-hdr div{padding:8px 4px;text-align:center;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--faint)}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mday{min-height:88px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 5px;background:var(--card)}
.mday:nth-child(7n){border-right:none}
.mday.other{background:var(--bg)}
.mday-num{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:3px}
.mday-num.today{background:var(--blue);color:#fff}
.mday-num.this{color:var(--ink)}
.mpill{font-size:9px;font-weight:700;border-radius:5px;padding:2px 5px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;border-left:2px solid}
.mpill.confirmed{background:#D9F4EA;border-color:var(--green);color:#0E5C42}
.mpill.pending{background:#FCEBC9;border-color:var(--amber);color:#7A4E10}
.mmore{font-size:8.5px;font-weight:700;color:var(--faint);padding:1px 0}

/* ── POPOVER ── */
.cpop{display:none;position:fixed;z-index:200;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:0 12px 36px rgba(22,41,78,.18);min-width:254px;max-width:300px}
.cpop-name{font-weight:800;font-size:15px;color:var(--ink);margin-bottom:2px}
.cpop-ref{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--blue-deep);background:var(--blue-soft);display:inline-block;padding:2px 9px;border-radius:99px;margin-bottom:11px}
.cpop-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:9px;font-size:12.5px;color:var(--muted);line-height:1.4}
.cpop-ico{width:25px;height:25px;border-radius:8px;background:var(--slate-s);display:grid;place-items:center;font-size:12px;flex-shrink:0;margin-top:1px}
.cpop-acts{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.cpop-btn{flex:1;padding:9px 8px;border-radius:999px;font-size:12px;font-weight:800;border:none;cursor:pointer;transition:all .18s}
.cpop-ok{background:var(--green-s);color:var(--green)}
.cpop-ok:hover{background:var(--green);color:#fff}
.cpop-no{background:var(--rose-s);color:var(--rose)}
.cpop-no:hover{background:var(--rose);color:#fff}
.cpop-x{position:absolute;top:11px;right:11px;width:23px;height:23px;border-radius:8px;border:none;background:var(--slate-s);color:var(--slate);cursor:pointer;font-size:13px;display:grid;place-items:center;transition:.15s}
.cpop-x:hover{background:var(--rose);color:#fff}

/* ── FORMS / OTHER PANES ── */
.gcard{background:var(--card);border-radius:var(--r);padding:22px;margin-bottom:16px;box-shadow:var(--shadow)}
.gcard h3{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:14px}
.gform{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;margin-top:12px}
.fi{width:100%;padding:12px 15px;border:1.5px solid var(--line);border-radius:13px;font-size:14px;color:var(--ink);background:var(--card2);transition:border-color .18s,background .18s}
.fi:focus{border-color:var(--blue);background:#fff}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;border:1.5px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;transition:all .18s}
.btn:hover{border-color:var(--blue);color:var(--blue-deep)}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 6px 14px rgba(62,123,250,.28)}
.btn.pri:hover{background:var(--blue-deep)}
.btn.dng{background:var(--rose-s);color:var(--rose);border-color:transparent}
.btn.dng:hover{background:var(--rose);color:#fff}
.timrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px 15px;margin-bottom:9px}
.timrow b{font-size:13px;font-weight:800;color:var(--ink);min-width:36px}
.sess{display:inline-flex;align-items:center;gap:5px;background:var(--blue-soft);color:var(--blue-deep);border-radius:999px;padding:5px 12px;font-size:12.5px;font-weight:700}
.sess button{background:none;border:none;cursor:pointer;color:var(--slate);font-size:12px}
.tadd{padding:6px 14px;border-radius:999px;border:1.5px dashed var(--line);background:transparent;font-size:12px;color:var(--muted);cursor:pointer;transition:all .18s}
.tadd:hover{border-color:var(--blue);color:var(--blue-deep)}
.rcard{background:var(--card);border-radius:var(--r);padding:15px;animation:fadeUp .25s both;box-shadow:var(--shadow)}
.rn{font-size:13.5px;font-weight:800;color:var(--ink)}
.rs{font-size:12px;color:var(--muted);margin-top:1px}
.rr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--muted)}
.tchip{font-size:11px;font-weight:800;padding:2px 9px;border-radius:99px}
.tchip.g{background:var(--green-s);color:var(--green)}
.tchip.y{background:var(--amber-s);color:var(--amber)}
.tchip.r{background:var(--rose-s);color:var(--rose)}
#rosterGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:12px}
#modal{position:fixed;inset:0;z-index:60;display:none;place-items:center;padding:20px}
#modal.open{display:grid}
#modal .mbg{position:absolute;inset:0;background:rgba(22,41,78,.4);backdrop-filter:blur(6px)}
#modal .mbox{position:relative;z-index:1;background:var(--card);border-radius:22px;padding:28px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(22,41,78,.28)}
.mslots{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.ms{padding:8px 15px;border-radius:999px;border:1.5px solid var(--line);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--ink)}
.ms:hover{border-color:var(--blue);color:var(--blue-deep)}
.ms.on{background:var(--blue);border-color:var(--blue);color:#fff}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
#mc h2{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:8px}
#acctInfo{display:flex;gap:16px;align-items:center;background:var(--tint);border-radius:var(--r);padding:16px;margin-bottom:16px}
.admin-badge{display:inline-flex;align-items:center;background:var(--amber-s);color:var(--amber);font-size:10px;font-weight:800;padding:3px 10px;border-radius:99px;letter-spacing:.05em;margin-left:6px}
#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,80px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:700;padding:12px 24px;border-radius:999px;transition:transform .42s cubic-bezier(.34,1.6,.4,1);z-index:70;pointer-events:none;white-space:nowrap;box-shadow:0 12px 28px rgba(22,41,78,.3)}
#toast.show{transform:translate(-50%,0)}

/* ── MOBILE ── */
@media(max-width:900px){
  .rail{position:fixed;bottom:0;left:0;right:0;top:auto;width:auto;height:64px;flex-direction:row;justify-content:space-around;padding:8px 10px;border-right:none;border-top:1px solid var(--line);gap:2px}
  .rmark,.rsep{display:none}
  .rib.sp{margin-top:0}
  #app{height:auto;overflow:visible}
  .shell{display:block;height:auto}
  .main{overflow:visible}
  .pg{padding:16px 16px 96px;overflow:visible}
  .topbar{padding:18px 16px 0}
  .topbar h2{font-size:23px}
  .dash-grid{grid-template-columns:1fr}
  .ds-strip,.bandstrip{grid-template-columns:1fr 1fr}
  .gform{grid-template-columns:1fr}
  .hero .meta{gap:12px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="lmark">ௐ</div>

  </div>
</div>

<!-- APP -->
<div id="app"><div class="shell">

  <!-- RAIL -->
  <div class="rail">
    <div class="rmark">AP</div>
    <button class="rib on" data-p="dash" title="Home">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    </button>
    <button class="rib" data-p="inbox" title="Inbox">
      <svg viewBox="0 0 24 24"><path d="M3 8l7.9 5.3a2 2 0 0 0 2.2 0L21 8M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg>
      <div class="badge" id="ribBadge"></div>
    </button>
    <button class="rib" data-p="day" title="Calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
    </button>
    <button class="rib" data-p="blocks" id="ribBlocks" title="Block time">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M4.2 4.2l15.6 15.6"/></svg>
    </button>
    <button class="rib" data-p="timings" id="ribTimings" title="My timings">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h7"/><circle cx="19" cy="18" r="3"/><path d="M19 15v3l1.5 1.5"/></svg>
    </button>
    <button class="rib" data-p="roster" id="ribRoster" style="display:none" title="Roster">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.3"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5M15 15c2.3.3 4.5 1.9 4.5 4"/></svg>
    </button>
    <div class="rsep"></div>
    <button class="rib sp" data-p="acct" title="Account">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </button>
    <button class="rib" id="ava" title="Profile">--</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div><h2 id="tTitle">Dashboard</h2><div class="tsub" id="tSub"></div></div>
      <div id="tRight"></div>
    </div>

    <!-- DASHBOARD -->
    <div class="pane on" id="p-dash">
      <div class="pg">
        <div class="ds-strip" id="dStats"></div>
        <div class="dash-grid">
          <div>
            <div id="dHero"></div>
            <div class="pending-wrap">
              <div class="pending-hdr">
                <span>Pending requests</span>
                <div class="pbadge" id="dPendingBadge"></div>
                <button class="view-all" onclick="go('inbox')">View all →</button>
              </div>
              <div id="dPendingList"></div>
            </div>
          </div>
          <aside class="side">
            <div class="mini-cal-wrap"><div id="dMiniCal"></div></div>
            <div class="card">
              <div class="ch">Upcoming today</div>
              <div id="dUpcoming"></div>
            </div>
            <div class="card">
              <div class="ch">Quick actions</div>
              <div class="quick-grid">
                <button class="qbtn" onclick="go('day');setTimeout(renderCalendar,60)">
                  <div class="qt">Calendar</div><div class="qs">Day · Week · Month</div>
                </button>
                <button class="qbtn" onclick="go('inbox')">
                  <div class="qt">Inbox</div><div class="qs">Confirm or decline</div>
                </button>
                <button class="qbtn" id="qbBlocks" onclick="go('blocks')">
                  <div class="qt">Block time</div><div class="qs">Surgery, rounds</div>
                </button>
                <button class="qbtn" id="qbTimings" onclick="go('timings')">
                  <div class="qt">My timings</div><div class="qs">OP session hours</div>
                </button>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <!-- INBOX -->
    <div class="pane" id="p-inbox">
      <div class="pg">
        <div class="bandstrip" id="bands"></div>
        <div class="srow">
          <div class="sbox">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            <input id="srch" placeholder="Search patient, phone or booking ref…">
          </div>
        </div>
        <div id="inboxBody"></div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div class="pane" id="p-day">
      <div class="pg">
        <div class="cal-wrap">
          <div class="cal-tb">
            <div class="cal-vtog">
              <button class="cvbtn on" id="cvDay" onclick="setCalView('day')">Day</button>
              <button class="cvbtn" id="cvWeek" onclick="setCalView('week')">Week</button>
              <button class="cvbtn" id="cvMonth" onclick="setCalView('month')">Month</button>
            </div>
            <button class="cal-nb" onclick="calNav(-1)">&#8249;</button>
            <span class="cal-rl" id="calRangeLabel"></span>
            <button class="cal-nb" onclick="calNav(1)">&#8250;</button>
            <button class="cal-tb-today" onclick="calGoToday()">Today</button>
            <div class="cal-dpill" id="calDocLabel">
              <div class="cal-dpill-av" id="calDocAv"></div>
              <span id="calDocName"></span>
            </div>
          </div>
          <div class="cal-grid">
            <div class="cal-gt" id="calGutter"><div class="cal-gt-hdr"></div></div>
            <div class="cal-cs" id="calCols"></div>
          </div>
          <div class="cal-leg-bar">
            <div class="cal-leg-item"><div class="cal-leg-sq" style="background:#1FA97C"></div>Confirmed</div>
            <div class="cal-leg-item"><div class="cal-leg-sq" style="background:#D98E1B"></div>Pending</div>
            <div class="cal-leg-item"><div class="cal-leg-sq" style="background:#8FA3C0"></div>Blocked</div>
            <div class="cal-leg-item" style="margin-left:auto"><div style="width:16px;height:2px;background:#3E7BFA;border-radius:2px;margin-right:3px"></div>Now</div>
          </div>
        </div>
        <div class="cpop" id="calPopover">
          <button class="cpop-x" onclick="document.getElementById('calPopover').style.display='none'">&#215;</button>
          <div class="cpop-name" id="cpName"></div>
          <div class="cpop-ref" id="cpSpec"></div>
          <div class="cpop-row"><div class="cpop-ico">&#128197;</div><div id="cpTime"></div></div>
          <div class="cpop-row"><div class="cpop-ico">&#128222;</div><div id="cpPhone"></div></div>
          <div class="cpop-row" id="cpReasonRow" style="display:none"><div class="cpop-ico">&#128172;</div><div id="cpReason"></div></div>
          <div class="cpop-acts" id="cpActions"></div>
        </div>
      </div>
    </div>

    <!-- BLOCK TIME -->
    <div class="pane" id="p-blocks">
      <div class="pg">
        <div class="gcard">
          <h3>Block time from patients</h3>
          <div class="gform">
            <div><label class="fl">Date</label><input class="fi" type="date" id="bDate"></div>
            <div><label class="fl">Category</label><select class="fi" id="bCat"><option value="surgery">Surgery</option><option value="rounds">Rounds</option><option value="procedure">Procedure</option><option value="personal">Personal</option><option value="other">Other</option></select></div>
            <div><label class="fl">From</label><input class="fi" type="time" id="bFrom"></div>
            <div><label class="fl">To</label><input class="fi" type="time" id="bTo"></div>
          </div>
          <label class="fl">Note (optional)</label>
          <input class="fi" type="text" id="bNote" placeholder="e.g. Liver resection — OT 2">
          <div style="margin-top:14px"><button class="btn pri" id="bSave">Block this time</button></div>
        </div>
        <div id="blockBody"></div>
      </div>
    </div>

    <!-- TIMINGS -->
    <div class="pane" id="p-timings">
      <div class="pg">
        <div class="gcard">
          <h3>Weekly consulting sessions</h3>
          <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Patients see 30-minute slots inside these windows. Sunday is always closed.</p>
          <div id="timBody"></div>
        </div>
      </div>
    </div>

    <!-- ROSTER (admin only) -->
    <div class="pane" id="p-roster">
      <div class="pg">
        <div class="srow">
          <input type="date" class="fi" style="width:auto" id="roDate">
          <button class="btn" id="roToday">Today</button>
          <span id="roSum" style="font-size:13px;color:var(--muted);margin-left:8px"></span>
        </div>
        <div id="rosterGrid"></div>
      </div>
    </div>

    <!-- ACCOUNT -->
    <div class="pane" id="p-acct">
      <div class="pg">
        <div class="gcard" style="max-width:480px">
          <div id="acctInfo"></div>
          <h3>Change password</h3>
          <label class="fl">New password</label><input class="fi" type="password" id="np1" placeholder="8+ characters">
          <label class="fl">Confirm password</label><input class="fi" type="password" id="np2" placeholder="Repeat new password">
          <div style="margin-top:14px"><button class="btn pri" id="npBtn">Update password</button></div>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div></div><!-- /shell /app -->

<div id="modal"><div class="mbg"></div><div class="mbox" id="mc"></div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
var sb=supabase.createClient('https://rjceujscaepqyxdlmqyp.supabase.co','sb_publishable_OmWwOc2efyaKNiWjwVPO-A_bZRfLT0i');
var $=id=>document.getElementById(id);
var me=null,isAdmin=false,isMasterAdmin=false,allDocs=[],TZ='Asia/Kolkata';
var PAL=[['#DFF0F0','#1A6060'],['#DBE9F5','#1A4A7A'],['#E8E4F5','#4A3A8A'],['#FDF0DC','#8A5A10'],['#D8F0E8','#1A6040'],['#F5E0E0','#7A2020']];
function pal(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))>>>0;return PAL[h%PAL.length]}
function ini(n){return(n||'').replace(/^Dr\.?\s*/i,'').split(/\s+/).filter(x=>/^[A-Za-z]/.test(x)).slice(0,2).map(x=>x[0].toUpperCase()).join('')||'?'}
function fT(iso){return new Date(iso).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:TZ})}
function fD(iso){return new Date(iso).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',timeZone:TZ})}
function fDL(iso){return new Date(iso).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',timeZone:TZ})}
function dkey(iso){return new Date(iso).toLocaleDateString('en-CA',{timeZone:TZ})}
function todayK(){return new Date().toLocaleDateString('en-CA',{timeZone:TZ})}
function toast(t){var e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2800)}
function esc(s){var d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
var EMPTY_SVG='<svg viewBox="0 0 160 32" width="120" height="24" style="display:block;margin:0 auto 12px;opacity:.3"><path d="M0 20 H50 L58 20 L65 6 L72 28 L79 12 L86 20 H160" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';

/* AUTH */
$('lbtn').addEventListener('click',doLogin);
$('lpass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function doLogin(){
  var b=$('lbtn');b.disabled=true;b.textContent='Signing in…';$('lerr').style.display='none';
  sb.auth.signInWithPassword({email:$('lemail').value.trim(),password:$('lpass').value}).then(r=>{
    b.disabled=false;b.textContent='Sign in →';
    if(r.error){$('lerr').textContent='Sign-in failed — check email and password.';$('lerr').style.display='block';return;}
    boot();
  });
}
$('ava').addEventListener('click',()=>go('acct'));
sb.auth.getSession().then(r=>{if(r.data.session)boot()});

function boot(){
  sb.auth.getUser().then(u=>{
    var user=u.data&&u.data.user;if(!user)return;
    var meta=user.app_metadata||{};
    sb.from('doctors').select('*').then(r=>{
      allDocs=r.data||[];
      me=allDocs.find(d=>d.auth_user_id===user.id)||null;
      isMasterAdmin=meta.role==='admin';
      isAdmin=isMasterAdmin||!!(me&&me.is_admin);
      if(!me){
        if(isMasterAdmin){
          me={id:null,full_name:'Hospital Admin',specialty:'Administration'};
        } else {
          $('lerr').textContent='No doctor profile found.';$('lerr').style.display='block';sb.auth.signOut();return;
        }
      }
      var c=me.id?pal(me.full_name):['#E3EDFF','#2B5FD9'];
      $('ava').textContent=ini(me.full_name);
      $('ava').style.background=c[0];$('ava').style.color=c[1];
      /* Role gating: roster for admin only; personal panes only for accounts with a doctor profile */
      if(isAdmin)$('ribRoster').style.display='';
      if(!me.id){
        $('ribBlocks').style.display='none';$('ribTimings').style.display='none';

/* NAV */
function greeting(){var h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';}
function firstName(){return me.id?me.full_name.replace(/^Dr\.?\s*/i,'').split(' ')[0]:'Admin';}
var HDRS={
  dash:[()=>'Good '+greeting()+', '+(me.id?'Dr. ':'')+firstName(),()=>new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+(isAdmin?' · Hospital overview — all doctors':' · '+(me.specialty||''))],
  inbox:[()=>'Inbox',()=>'Appointment requests'+(isAdmin?' — all doctors':'')],
  day:[()=>'Calendar',()=>'Day · Week · Month views'],
  blocks:[()=>'Block time',()=>'Hide slots for surgery, rounds or personal time'],
  timings:[()=>'My timings',()=>'Weekly consulting sessions — 30-minute patient slots'],

};
function go(p){
  document.querySelectorAll('.rib').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
  $('p-'+p).classList.add('on');

window.go=go;
document.querySelectorAll('.rib').forEach(b=>b.addEventListener('click',()=>{

}));

/* INBOX */
var cache={pending:[],upcoming:[],past:[]};
function loadAll(){loadInbox();if(me.id){loadBlocks();loadTimings();}if(isAdmin)loadRoster();}
function loadInbox(){
  var now=new Date().toISOString(),p30=new Date(Date.now()-30*864e5).toISOString();
  var q1=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id,doctors!appointments_doctor_id_fkey(full_name)').eq('status','pending').order('slot_start');
  var q2=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id,doctors!appointments_doctor_id_fkey(full_name)').eq('status','confirmed').gte('slot_start',now).order('slot_start');
  var q3=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id,doctors!appointments_doctor_id_fkey(full_name)').in('status',['completed','rejected','cancelled_by_doctor','cancelled_by_patient','rescheduled','no_show']).gte('slot_start',p30).order('slot_start',{ascending:false}).limit(40);
  if(!isAdmin){q1=q1.eq('doctor_id',me.id);q2=q2.eq('doctor_id',me.id);q3=q3.eq('doctor_id',me.id);}
  Promise.all([q1,q2,q3]).then(([r1,r2,r3])=>{
    cache.pending=r1.data||[];cache.upcoming=r2.data||[];cache.past=r3.data||[];
    var n=cache.pending.length;
    $('ribBadge').style.display=n?'grid':'none';$('ribBadge').textContent=n;
    renderDash();
    var todayC=cache.upcoming.filter(a=>dkey(a.slot_start)===todayK()).length;
    var weekC=cache.upcoming.filter(a=>new Date(a.slot_start)-Date.now()<7*864e5).length;
    $('bands').innerHTML=band('b1',n,'Awaiting decision','M12 8v4l2 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0')+band('b2',todayC,'Confirmed today','M5 13l4 4L19 7')+band('b3',weekC,'This week','M8 3v4M16 3v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2')+band('b4',cache.past.length,'Past 30 days','M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2');
    renderInbox();
  });
}
function band(cls,n,label,path){return`<div class="band ${cls}"><div class="ic"><svg viewBox="0 0 24 24"><path d="${path}"/></svg></div><div><b>${n}</b><span>${label}</span></div></div>`;}
$('srch').addEventListener('input',renderInbox);
function match(a,t){if(!t)return true;t=t.toLowerCase();return(a.patient_name||'').toLowerCase().includes(t)||(a.patient_phone||'').includes(t)||(a.booking_ref||'').toLowerCase().includes(t);}
function renderInbox(){
  var t=$('srch').value.trim(),box=$('inboxBody');
  var pend=cache.pending.filter(a=>match(a,t));
  var upc=cache.upcoming.filter(a=>match(a,t));
  var pst=cache.past.filter(a=>match(a,t));
  var html='';
  if(!pend.length&&!upc.length&&!pst.length){box.innerHTML=`<div class="empty">${EMPTY_SVG}<p>All caught up — nothing needs attention.</p></div>`;return;}
  if(pend.length) html+=`<div class="sl">Needs your decision <span>${pend.length}</span></div><div class="aplist">`+pend.map((a,i)=>aCard(a,'pending',i)).join('')+'</div>';
  if(upc.length) html+=`<div class="sl" style="margin-top:20px">Upcoming confirmed</div><div class="aplist">`+upc.map((a,i)=>aCard(a,'upcoming',i)).join('')+'</div>';
  if(pst.length&&t) html+=`<div class="sl" style="margin-top:20px">Past 30 days</div><div class="aplist">`+pst.map((a,i)=>aCard(a,'past',i)).join('')+'</div>';
  box.innerHTML=html;
}
function aCard(a,mode,idx){
  var c=pal(a.patient_name),delay=(idx*0.04)+'s';
  var doc=isAdmin?(a.doctors&&a.doctors.full_name)||'—':null;
  var acts='';
  if(mode==='pending'){
    acts=`<button class="ab ok" onclick="setStatus('${a.id}','confirmed')"><svg viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M5 13l4 4L19 7"/></svg>Confirm</button>`+
    `<button class="ab no" onclick="askReject(this,'${a.id}','rejected')"><svg viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M18 6L6 18M6 6l12 12"/></svg>Decline</button>`+
    `<button class="ab gh" onclick="openResched('${a.id}')" style="margin-left:auto">Reschedule</button>`;
  }else if(mode==='upcoming'){
    acts=`<button class="ab gh" onclick="openResched('${a.id}')">Reschedule</button><button class="ab no" onclick="askReject(this,'${a.id}','cancelled_by_doctor')">Cancel visit</button>`;
  }
  return`<div class="apc" style="animation-delay:${delay}">
    <div class="top">
      <div class="ava2" style="background:${c[0]};color:${c[1]}">${ini(a.patient_name)}</div>
      <div class="meta">
        <div class="name">${esc(a.patient_name)}<span class="ref">${a.booking_ref}</span>${doc?`<span style="font-size:11px;color:var(--muted);font-weight:700">${esc(doc)}</span>`:''}</div>
        <div class="detail">${a.reason?esc(a.reason)+' · ':''}<a href="tel:+91${esc(a.patient_phone)}" style="color:var(--blue-deep);font-weight:700">${esc(a.patient_phone)}</a></div>
      </div>
      <span class="pill ${a.status}">${a.status.replace(/_/g,' ')}</span>
    </div>
    <div class="slotbar">
      <svg width="16" height="16" viewBox="0 0 24 24" style="color:var(--blue)"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span class="stime">${fD(a.slot_start)} · ${fT(a.slot_start)}</span>
      <span class="sdoc">30 min</span>
    </div>
    ${acts?`<div class="acts">${acts}</div>`:''}
  </div>`;
}
window.setStatus=function(id,st){
  sb.from('appointments').update({status:st}).eq('id',id).then(r=>{
    if(r.error){toast('Update failed');return;}
    var msgs={confirmed:'Confirmed ✓',rejected:'Declined',cancelled_by_doctor:'Cancelled'};
    toast(msgs[st]||'Updated');loadInbox();if(isAdmin)loadRoster();
  });
};
window.askReject=function(btn,id,st){
  var label=st==='rejected'?'Decline this request?':'Cancel this visit?';
  btn.closest('.acts').innerHTML=`<div class="cfm"><span style="font-size:13px;color:var(--muted)">${label}</span><button class="ab yes" onclick="setStatus('${id}','${st}')">Yes</button><button class="ab gh" onclick="loadInbox()">Keep it</button></div>`;
};

/* RESCHEDULE */
window.openResched=function(id){
  sb.from('appointments').select('*').eq('id',id).single().then(r=>{
    if(r.error)return toast('Could not load');
    var a=r.data,chosen=null;
    $('mc').innerHTML=`<h2>Reschedule</h2><p style="font-size:13px;color:var(--muted);margin-bottom:14px">${esc(a.patient_name)} · ${fD(a.slot_start)} ${fT(a.slot_start)}</p><label class="fl">Pick a new date</label><input class="fi" type="date" id="rsDate" min="${todayK()}"><div id="rsSlots" style="margin-top:12px;font-size:13px;color:var(--muted)">Choose a date to see available slots.</div><div class="mact"><button class="btn" onclick="closeModal()">Close</button><button class="btn pri" id="rsGo" disabled>Move appointment</button></div>`;
    $('modal').classList.add('open');
    $('rsDate').addEventListener('change',()=>{
      sb.rpc('get_available_slots',{p_doctor:a.doctor_id,p_day:$('rsDate').value}).then(res=>{
        var sl=res.data||[];
        $('rsSlots').innerHTML=sl.length?`<div class="sl" style="margin:8px 0">Available slots</div><div class="mslots">${sl.map(s=>`<span class="ms" data-s="${s.slot_start}" data-e="${s.slot_end}">${fT(s.slot_start)}</span>`).join('')}</div>`:'No slots available.';
        document.querySelectorAll('.ms').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.ms').forEach(x=>x.classList.remove('on'));c.classList.add('on');chosen={s:c.dataset.s,e:c.dataset.e};$('rsGo').disabled=false;}));
      });
    });
    $('rsGo').addEventListener('click',()=>{
      if(!chosen)return;
      sb.from('appointments').insert({doctor_id:a.doctor_id,patient_name:a.patient_name,patient_phone:a.patient_phone,patient_email:a.patient_email,patient_age:a.patient_age,patient_gender:a.patient_gender,reason:a.reason,slot_start:chosen.s,slot_end:chosen.e,status:'confirmed',rescheduled_from:a.id}).then(ins=>{
        if(ins.error)return toast('Slot taken — try another');
        sb.from('appointments').update({status:'rescheduled'}).eq('id',a.id).then(()=>{closeModal();toast('Rescheduled ✓');loadInbox();});
      });
    });
  });
};
window.closeModal=function(){$('modal').classList.remove('open')};
document.querySelector('#modal .mbg').addEventListener('click',closeModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function loadRoster(){
  var day=$('roDate').value;if(!day)return;
  var from=new Date(day+'T00:00:00+05:30').toISOString(),to=new Date(day+'T23:59:59+05:30').toISOString();

    sb.from('appointments').select('doctor_id,status').gte('slot_start',from).lte('slot_start',to).in('status',['pending','confirmed']),

  ]).then(([r1,r2])=>{

/* ─── DASHBOARD ─── */
function renderDash(){

  var n=cache.pending.length;
  var todayC=cache.upcoming.filter(function(a){return dkey(a.slot_start)===todayStr;}).length;
  var weekC=cache.upcoming.filter(function(a){return new Date(a.slot_start)-Date.now()<7*864e5;}).length;

  if(sEl){
    if(isAdmin){
      sEl.innerHTML=
        mkStat(n,'All pending','#D98E1B','#FDF1DC','M12 8v4l2 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0')+
        mkStat(todayC,'Today at hospital','#2B5FD9','#E3EDFF','M5 13l4 4L19 7')+
        mkStat(weekC,'This week','#1FA97C','#E2F7EF','M8 3v4M16 3v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2')+
        mkStat(allDocs.length,'Doctors on roster','#8E7BF2','#EEEAFE','M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75');
    } else {
      sEl.innerHTML=
        mkStat(n,'Pending requests','#D98E1B','#FDF1DC','M12 8v4l2 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0')+
        mkStat(todayC,'Today','#2B5FD9','#E3EDFF','M5 13l4 4L19 7')+
        mkStat(weekC,'This week','#1FA97C','#E2F7EF','M8 3v4M16 3v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2')+
        mkStat(cache.past.length,'Past 30 days','#8FA3C0','#EBF1F8','M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2');

        +'<div><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>'+fT(next.slot_start)+' – '+fT(next.slot_end)+'</div>'
        +(next.reason?'<div><svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 8.6 8.6 0 0 1-3.5-.7L3 21l1.8-5.5A8.4 8.4 0 1 1 21 11.5z"/></svg>'+esc(next.reason)+'</div>':'')
        +'</div>'

/* ── MINI CALENDAR ── */
var miniCalView='week', miniCalAnchor=new Date();miniCalAnchor.setHours(0,0,0,0);
function renderMiniCal(){
  var box=$('dMiniCal');if(!box||!me)return;
  var isWeek=miniCalView==='week';
  var MH=32,HH=42,BH=14,MS=10,ME=14,ES=18,EE=21;
  var TH=MH+(ME-MS)*HH+BH+(EE-ES)*HH;
  function cy(iso){
    var d=new Date(iso),h=d.getHours(),m=d.getMinutes();
    if(h>=MS&&h<ME) return MH+(h-MS)*HH+m/60*HH;
    if(h>=ES&&h<EE) return MH+(ME-MS)*HH+BH+(h-ES)*HH+m/60*HH;
    return -1;
  }
  var dates=[];
  if(isWeek){
    var mon=new Date(miniCalAnchor),dow=mon.getDay()||7;mon.setDate(mon.getDate()-(dow-1));
    for(var i=0;i<6;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);dates.push(x);}
  } else {
    dates=[new Date(miniCalAnchor)];
  }
  var from=dates[0].toISOString().slice(0,10)+'T00:00:00';
  var to=dates[dates.length-1].toISOString().slice(0,10)+'T23:59:59';
  var rl=isWeek
    ?(dates[0].getDate()+' \u2013 '+dates[5].getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dates[5].getMonth()])
    :(new Date(miniCalAnchor).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}));

  var q=sb.from('appointments').select('id,patient_name,slot_start,slot_end,status,doctor_id,patient_phone,reason,booking_ref').gte('slot_start',from).lte('slot_start',to).in('status',['pending','confirmed']).order('slot_start');
  if(!isAdmin) q=q.eq('doctor_id',me.id);
  q.then(function(res){
    var appts=res.data||[];
    // Gutter HTML
    var gutHtml='<div style="height:'+MH+'px;border-bottom:1px solid var(--line)"></div>';
    for(var hr=MS;hr<ME;hr++){gutHtml+='<div style="height:'+HH+'px;border-bottom:1px solid var(--line);position:relative"><span style="position:absolute;right:6px;top:2px;font-size:8px;font-weight:700;color:var(--faint)">'+hr+':00</span></div>';}
    gutHtml+='<div style="height:'+BH+'px;background:var(--bg);border-top:1px solid var(--line);border-bottom:1px solid var(--line)"></div>';
    for(var hr=ES;hr<EE;hr++){gutHtml+='<div style="height:'+HH+'px;border-bottom:1px solid var(--line);position:relative"><span style="position:absolute;right:6px;top:2px;font-size:8px;font-weight:700;color:var(--faint)">'+hr+':00</span></div>';}

    // Columns
    var colsHtml=dates.map(function(d){
      var iso=d.toISOString().slice(0,10);
      var isT=d.toDateString()===new Date().toDateString();
      var dayA=appts.filter(function(a){return a.slot_start.slice(0,10)===iso;});
      var chips='';
      dayA.forEach(function(a){
        var ty=cy(a.slot_start),by=cy(a.slot_end);if(ty<0)return;
        var h=Math.max(20,by-ty);
        var bg=a.status==='confirmed'?'#D9F4EA':'#FCEBC9';
        var bc=a.status==='confirmed'?'#1FA97C':'#D98E1B';
        var tc=a.status==='confirmed'?'#0E5C42':'#7A4E10';
        chips+='<div style="position:absolute;left:2px;right:2px;top:'+ty+'px;height:'+h+'px;border-radius:6px;padding:2px 4px 2px 6px;background:'+bg+';border-left:2px solid '+bc+';overflow:hidden;cursor:pointer;z-index:2" onclick="showPop('+JSON.stringify(a).replace(/</g,'\\u003c').replace(/>/g,'\\u003e').replace(/"/g,'&quot;')+',event)">'
          +'<div style="font-size:8.5px;font-weight:800;color:'+tc+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(a.patient_name)+'</div>'
          +(h>28?'<div style="font-size:7.5px;color:'+bc+';font-weight:600">'+new Date(a.slot_start).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true})+'</div>':'')
        +'</div>';
      });
      if(isT){var ny=cy(new Date().toISOString());if(ny>0)chips+='<div style="position:absolute;left:0;right:0;top:'+ny+'px;height:2px;background:linear-gradient(90deg,#3E7BFA,transparent);z-index:5;pointer-events:none"><div style="position:absolute;left:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:#3E7BFA"></div></div>';}
      return '<div style="flex:1;min-width:'+(isWeek?'60px':'120px')+';border-right:1px solid var(--line);position:relative;height:'+TH+'px'+(isT?';background:rgba(62,123,250,.04)':'')+'">'
        +'<div style="height:'+MH+'px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;position:sticky;top:0;z-index:4;background:var(--card)">'
          +'<div style="width:20px;height:20px;border-radius:7px;display:grid;place-items:center;font-size:11px;font-weight:800;'+(isT?'background:#3E7BFA;color:#fff':'color:var(--muted)')+'">'+d.getDate()+'</div>'
          +'<div style="font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--faint)">'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+'</div>'
        +'</div>'
        +'<div style="position:absolute;left:0;right:0;top:'+MH+'px">'
          +Array.from({length:ME-MS},function(_,i){return '<div style="height:'+HH+'px;border-bottom:1px solid var(--line)"></div>';}).join('')
          +'<div style="height:'+BH+'px;background:var(--bg);border-top:1px solid var(--line);border-bottom:1px solid var(--line)"></div>'
          +Array.from({length:EE-ES},function(_,i){return '<div style="height:'+HH+'px;border-bottom:1px solid var(--line)"></div>';}).join('')
          +chips
        +'</div>'
      +'</div>';
    }).join('');

    box.innerHTML=
      '<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line)">'
        +'<div style="display:flex;background:var(--tint);border-radius:999px;padding:2px;gap:1px">'
          +'<button onclick="miniCalView=\'day\';renderMiniCal()" style="padding:4px 11px;border-radius:999px;font-size:10px;font-weight:700;border:none;cursor:pointer;background:'+(isWeek?'transparent':'#3E7BFA')+';color:'+(isWeek?'var(--muted)':'#fff')+'">Day</button>'
          +'<button onclick="miniCalView=\'week\';renderMiniCal()" style="padding:4px 11px;border-radius:999px;font-size:10px;font-weight:700;border:none;cursor:pointer;background:'+(isWeek?'#3E7BFA':'transparent')+';color:'+(isWeek?'#fff':'var(--muted)')+'">Week</button>'
        +'</div>'
        +'<button onclick="var d=new Date(miniCalAnchor);miniCalView===\'week\'?d.setDate(d.getDate()-7):d.setDate(d.getDate()-1);miniCalAnchor=d;renderMiniCal()" style="width:24px;height:24px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:13px;color:var(--muted);display:grid;place-items:center">&#8249;</button>'
        +'<span style="font-weight:800;font-size:11px;color:var(--ink);flex:1;text-align:center">'+rl+'</span>'
        +'<button onclick="var d=new Date(miniCalAnchor);miniCalView===\'week\'?d.setDate(d.getDate()+7):d.setDate(d.getDate()+1);miniCalAnchor=d;renderMiniCal()" style="width:24px;height:24px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:13px;color:var(--muted);display:grid;place-items:center">&#8250;</button>'
        +'<button onclick="miniCalAnchor=new Date();miniCalAnchor.setHours(0,0,0,0);renderMiniCal()" style="padding:4px 11px;border-radius:999px;border:1px solid #3E7BFA;color:#2B5FD9;background:transparent;font-size:10px;font-weight:800;cursor:pointer">Today</button>'
      +'</div>'
      +'<div style="display:flex;overflow:auto;max-height:320px;scrollbar-width:thin;scrollbar-color:var(--line) transparent">'
        +'<div style="width:38px;flex-shrink:0;border-right:1px solid var(--line);position:relative;height:'+TH+'px;background:var(--card2)">'+gutHtml+'</div>'
        +'<div style="flex:1;display:flex;min-width:0">'+colsHtml+'</div>'
      +'</div>';
  });
}
window.renderMiniCal=renderMiniCal;

/* ─── CALENDAR ─── */
var calView='day',calAnchor=new Date();
calAnchor.setHours(0,0,0,0);
var DAYS_S=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYS_L=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS_C=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MONTHS_L=['January','February','March','April','May','June','July','August','September','October','November','December'];
var CAL_HDR=42,HOUR_H=56,BREAK_H=18;
var MOR_S=10,MOR_E=14,EVE_S=18,EVE_E=21;

function calY(iso){
  var d=new Date(iso),h=d.getHours(),m=d.getMinutes();
  if(h>=MOR_S&&h<MOR_E) return CAL_HDR+(h-MOR_S)*HOUR_H+m/60*HOUR_H;
  if(h>=EVE_S&&h<EVE_E) return CAL_HDR+(MOR_E-MOR_S)*HOUR_H+BREAK_H+(h-EVE_S)*HOUR_H+m/60*HOUR_H;
  return -1;
}
function calTH(){return CAL_HDR+(MOR_E-MOR_S)*HOUR_H+BREAK_H+(EVE_E-EVE_S)*HOUR_H;}

function buildGutter(){
  var g=$('calGutter');if(!g)return;
  g.innerHTML='<div class="cal-gt-hdr"></div>';
  g.style.height=calTH()+'px';
  var top=CAL_HDR;
  for(var hr=MOR_S;hr<MOR_E;hr++){
    var lbl=document.createElement('div');lbl.className='cal-gt-lbl';lbl.style.top=top+'px';lbl.textContent=hr+':00';g.appendChild(lbl);top+=HOUR_H;
  }
  var brk=document.createElement('div');brk.className='cal-gt-brk';brk.style.cssText='top:'+top+'px;height:'+BREAK_H+'px';brk.textContent='break';g.appendChild(brk);top+=BREAK_H;
  for(var hr=EVE_S;hr<EVE_E;hr++){
    var lbl=document.createElement('div');lbl.className='cal-gt-lbl';lbl.style.top=top+'px';lbl.textContent=hr+':00';g.appendChild(lbl);top+=HOUR_H;
  }
}

function buildCol(date,appts,blocks){
  var TH=calTH(),isToday=date.toDateString()===new Date().toDateString();
  var col=document.createElement('div');
  col.className='cal-dc'+(isToday?' is-today':'');col.style.height=TH+'px';
  var hdr=document.createElement('div');hdr.className='cal-dh';
  hdr.innerHTML='<div class="cal-dn'+(isToday?' today':'')+'">'+date.getDate()+'</div><div class="cal-dnm">'+DAYS_S[date.getDay()]+'</div>';
  col.appendChild(hdr);
  var y=CAL_HDR;
  for(var hr=MOR_S;hr<MOR_E;hr++){var row=document.createElement('div');row.className='cal-hr';row.style.cssText='top:'+y+'px;height:'+HOUR_H+'px';col.appendChild(row);y+=HOUR_H;}
  var b2=document.createElement('div');b2.className='cal-brk';b2.style.cssText='top:'+y+'px;height:'+BREAK_H+'px';col.appendChild(b2);y+=BREAK_H;
  for(var hr=EVE_S;hr<EVE_E;hr++){var row=document.createElement('div');row.className='cal-hr';row.style.cssText='top:'+y+'px;height:'+HOUR_H+'px';col.appendChild(row);y+=HOUR_H;}
  if(isToday){var ny=calY(new Date().toISOString());if(ny>0){var nl=document.createElement('div');nl.className='cal-now';nl.style.top=ny+'px';col.appendChild(nl);}}
  appts.forEach(function(a){
    var ty=calY(a.slot_start),by=calY(a.slot_end);if(ty<0)return;
    var h=Math.max(28,by-ty),chip=document.createElement('div');
    chip.className='cal-chip '+a.status;chip.style.cssText='top:'+ty+'px;height:'+h+'px';
    var t=new Date(a.slot_start).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true});
    chip.innerHTML='<div class="cal-chip-name">'+esc(a.patient_name)+'</div><div class="cal-chip-time">'+t+'</div>'+(h>44?'<div class="cal-chip-tag">'+a.status.replace(/_/g,' ')+'</div>':'');
    chip.addEventListener('click',function(e){e.stopPropagation();showPop(a,e);});
    col.appendChild(chip);
  });
  (blocks||[]).forEach(function(b){
    var ty=calY(b.start_at),by=calY(b.end_at);if(ty<0)return;
    var chip=document.createElement('div');chip.className='cal-chip blocked';
    chip.style.cssText='top:'+ty+'px;height:'+Math.max(28,by-ty)+'px';
    chip.innerHTML='<div class="cal-chip-name" style="font-size:10px">\uD83D\uDD12 '+esc(b.category||'Blocked')+'</div>';
    col.appendChild(chip);
  });
  return col;
}

function buildMonthView(dates,appts){
  var cols=$('calCols'),gt=$('calGutter');
  if(gt){gt.innerHTML='';gt.style.cssText='width:0;display:none';}
  cols.style.cssText='flex:1;display:block;width:100%;overflow-y:auto;max-height:calc(100vh - 240px)';
  var hdrRow=document.createElement('div');hdrRow.className='cal-month-hdr';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(function(d){var cell=document.createElement('div');cell.textContent=d;hdrRow.appendChild(cell);});
  cols.appendChild(hdrRow);
  var grid=document.createElement('div');grid.className='cal-month-grid';
  var today=new Date();today.setHours(0,0,0,0);var curMonth=calAnchor.getMonth();
  dates.forEach(function(cellDate){
    var iso=cellDate.toISOString().slice(0,10);
    var isThisMonth=cellDate.getMonth()===curMonth,isToday2=cellDate.toDateString()===today.toDateString();
    var cell=document.createElement('div');cell.className='mday'+(isThisMonth?'':' other');
    var numEl=document.createElement('div');numEl.className='mday-num'+(isToday2?' today':(isThisMonth?' this':''));
    numEl.textContent=cellDate.getDate();cell.appendChild(numEl);
    var dayAppts=appts.filter(function(a){return a.slot_start.slice(0,10)===iso;});
    var maxShow=isThisMonth?3:1;
    dayAppts.slice(0,maxShow).forEach(function(a){
      var t=new Date(a.slot_start).toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true});
      var pill=document.createElement('div');pill.className='mpill '+a.status;
      pill.textContent=t+' '+a.patient_name;pill.title=a.patient_name+' \u00b7 '+t;
      pill.addEventListener('click',function(e){e.stopPropagation();showPop(a,e);});cell.appendChild(pill);
    });
    if(dayAppts.length>maxShow){var more=document.createElement('div');more.className='mmore';more.textContent='+'+(dayAppts.length-maxShow)+' more';cell.appendChild(more);}
    grid.appendChild(cell);
  });
  cols.appendChild(grid);
}

window.setCalView=function(v){
  calView=v;
  $('cvDay').classList.toggle('on',v==='day');
  $('cvWeek').classList.toggle('on',v==='week');
  $('cvMonth').classList.toggle('on',v==='month');
  renderCalendar();
};
window.calNav=function(dir){
  var d=new Date(calAnchor);
  if(calView==='day') d.setDate(d.getDate()+dir);
  else if(calView==='week') d.setDate(d.getDate()+dir*7);
  else d.setMonth(d.getMonth()+dir);
  calAnchor=d;renderCalendar();
};
window.calGoToday=function(){calAnchor=new Date();calAnchor.setHours(0,0,0,0);renderCalendar();};

function renderCalendar(){
  if(!me)return;
  var pill=$('calDocLabel');
  if(pill){
    pill.style.display='flex';
    $('calDocAv').textContent=isAdmin&&!me.id?'AP':ini(me.full_name);
    $('calDocName').textContent=isAdmin?'All doctors':me.full_name;
  }
  var cols=$('calCols'),gt=$('calGutter');if(!cols)return;
  cols.innerHTML='';
  if(calView==='month'){
    if(gt)gt.style.cssText='width:0;display:none';
    cols.style.cssText='flex:1;display:block;width:100%';
  } else {
    if(gt)gt.style.cssText='width:52px;flex-shrink:0;border-right:1px solid var(--line);background:var(--card2);position:relative;display:block';
    cols.style.cssText='flex:1;display:flex;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 280px);min-height:'+calTH()+'px;scrollbar-width:thin';
    buildGutter();
  }
  var dates=[],rangeLabel='';
  if(calView==='day'){
    dates=[new Date(calAnchor)];
    rangeLabel=DAYS_L[calAnchor.getDay()]+', '+calAnchor.getDate()+' '+MONTHS_L[calAnchor.getMonth()]+' '+calAnchor.getFullYear();
  } else if(calView==='week'){
    var mon=new Date(calAnchor),dow=mon.getDay()||7;mon.setDate(mon.getDate()-(dow-1));
    for(var i=0;i<6;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);dates.push(x);}
    rangeLabel=dates[0].getDate()+' '+MONTHS_C[dates[0].getMonth()]+' \u2013 '+dates[5].getDate()+' '+MONTHS_C[dates[5].getMonth()]+' '+dates[5].getFullYear();
  } else {
    var firstDay=new Date(calAnchor.getFullYear(),calAnchor.getMonth(),1);
    var startDow=firstDay.getDay()||7;var gridStart=new Date(firstDay);gridStart.setDate(firstDay.getDate()-(startDow-1));
    for(var i=0;i<42;i++){var x=new Date(gridStart);x.setDate(gridStart.getDate()+i);dates.push(x);}
    rangeLabel=MONTHS_L[calAnchor.getMonth()]+' '+calAnchor.getFullYear();
  }
  $('calRangeLabel').textContent=rangeLabel;
  var from=dates[0].toISOString().slice(0,10)+'T00:00:00';
  var to=dates[dates.length-1].toISOString().slice(0,10)+'T23:59:59';
  var fromISO=new Date(dates[0].toISOString().slice(0,10)+'T00:00:00+05:30').toISOString();
  var toISO=new Date(dates[dates.length-1].toISOString().slice(0,10)+'T23:59:59+05:30').toISOString();
  var q=sb.from('appointments').select('id,booking_ref,patient_name,patient_phone,reason,slot_start,slot_end,status,doctor_id').gte('slot_start',from).lte('slot_start',to).in('status',['pending','confirmed','rescheduled']).order('slot_start');
  if(!isAdmin)q=q.eq('doctor_id',me.id);
  var bq=sb.from('slot_blocks').select('start_at,end_at,category,note,doctor_id').lte('start_at',toISO).gte('end_at',fromISO);
  if(!isAdmin)bq=bq.eq('doctor_id',me.id);
  Promise.all([q,bq]).then(function(res){
    var appts=res[0].data||[],blocks=res[1].data||[];
    if(calView==='month'){
      buildMonthView(dates,appts);
    } else {
      dates.forEach(function(d){
        var iso=d.toISOString().slice(0,10);
        cols.appendChild(buildCol(d,
          appts.filter(function(a){return a.slot_start.slice(0,10)===iso;}),
          blocks.filter(function(b){return dkey(b.start_at)===iso;})
        ));
      });
    }
  });
}
window.renderCalendar=renderCalendar;

function showPop(a,e){
  var pop=$('calPopover');if(!pop)return;
  var t=new Date(a.slot_start).toLocaleString('en-IN',{weekday:'short',day:'numeric',month:'short',hour:'numeric',minute:'2-digit',hour12:true});
  $('cpName').textContent=a.patient_name;
  $('cpSpec').textContent=(a.booking_ref||'\u2014')+' \u00b7 '+a.status.replace(/_/g,' ').toUpperCase();
  $('cpTime').innerHTML='<strong>'+t+'</strong>';
  $('cpPhone').innerHTML='<a href="tel:+91'+esc(a.patient_phone)+'" style="color:var(--blue-deep);font-weight:700;text-decoration:none">+91 '+esc(a.patient_phone)+'</a>';
  var rr=$('cpReasonRow');
  if(a.reason){rr.style.display='flex';$('cpReason').textContent=a.reason;}else rr.style.display='none';
  var acts='';
  if(a.status==='pending') acts='<button class="cpop-btn cpop-ok" onclick="calConfirm(\''+a.id+'\')">Confirm</button><button class="cpop-btn cpop-no" onclick="calDecline(\''+a.id+'\')">Decline</button>';
  if(a.status==='confirmed') acts='<button class="cpop-btn cpop-no" onclick="calDecline(\''+a.id+'\')">Cancel</button>';
  $('cpActions').innerHTML=acts;
  var tgt=e.target.closest?e.target.closest('.cal-chip')||e.target:e.target;
  var r=tgt.getBoundingClientRect?tgt.getBoundingClientRect():{bottom:e.clientY+6,right:e.clientX+8};
  pop.style.cssText='display:block;top:'+Math.min(r.bottom+6,window.innerHeight-300)+'px;left:'+Math.min(r.right+8,window.innerWidth-310)+'px';
}
window.showPop=showPop;
window.calConfirm=function(id){
  sb.from('appointments').update({status:'confirmed'}).eq('id',id).then(function(){$('calPopover').style.display='none';renderCalendar();loadInbox();});
};
window.calDecline=function(id){
  if(!confirm('Cancel this appointment?'))return;
  sb.from('appointments').update({status:'cancelled_by_doctor'}).eq('id',id).then(function(){$('calPopover').style.display='none';renderCalendar();loadInbox();});
};
document.addEventListener('click',function(e){
  var pop=$('calPopover');
  if(pop&&pop.style.display==='block'&&!pop.contains(e.target)&&!e.target.closest('.cal-chip'))pop.style.display='none';
});

})();</script>
</body>
</html>
